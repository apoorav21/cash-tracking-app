name: Build Android APK

# Builds the Cashflow Android app from the Capacitor project in app/.
# Runs on every push to main, and can be triggered manually from the Actions tab.
on:
  push:
    branches: [ main ]
    paths:
      - 'app/**'
      - '.github/workflows/android.yml'
  workflow_dispatch:
    inputs:
      release:
        description: 'Build a signed release APK (needs signing secrets)'
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor dependencies
        working-directory: app
        run: npm install

      - name: Generate the Android project
        working-directory: app
        run: npx cap add android

      - name: Generate app icons & splash screen
        working-directory: app
        run: >
          npx @capacitor/assets generate --android
          --iconBackgroundColor '#F2784B'
          --iconBackgroundColorDark '#2A2420'
          --splashBackgroundColor '#FBF6EF'
          --splashBackgroundColorDark '#2A2420'

      - name: Add microphone + internet permissions to the manifest
        working-directory: app
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const p = 'android/app/src/main/AndroidManifest.xml';
          let m = fs.readFileSync(p, 'utf8');
          const perms = [
            'android.permission.INTERNET',
            'android.permission.RECORD_AUDIO',
            'android.permission.MODIFY_AUDIO_SETTINGS',
          ];
          const lines = perms
            .filter((perm) => !m.includes(perm))
            .map((perm) => `    <uses-permission android:name="${perm}" />`)
            .join('\n');
          if (lines) m = m.replace('<application', lines + '\n\n    <application');
          fs.writeFileSync(p, m);
          console.log(m);
          NODE

      - name: Copy web assets into the Android project
        working-directory: app
        run: npx cap sync android

      - name: Build debug APK
        working-directory: app/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: cashflow-debug-apk
          path: app/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      # ----- Signed release build (only when you trigger it with release=true) -----
      - name: Decode the upload keystore
        if: ${{ github.event.inputs.release == 'true' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > app/android/app/upload.keystore

      - name: Build signed release APK + AAB
        if: ${{ github.event.inputs.release == 'true' }}
        working-directory: app/android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease bundleRelease --no-daemon --stacktrace \
            -Pandroid.injected.signing.store.file=app/upload.keystore \
            -Pandroid.injected.signing.store.password="$ANDROID_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$ANDROID_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$ANDROID_KEY_PASSWORD"

      - name: Upload signed release (APK + AAB for Play Store)
        if: ${{ github.event.inputs.release == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: cashflow-release
          path: |
            app/android/app/build/outputs/apk/release/app-release.apk
            app/android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
