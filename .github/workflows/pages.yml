name: Deploy live demo to GitHub Pages

# Publishes the static web app (app/www) so the portfolio can link a "Try it live"
# demo. The app talks to the already-deployed AWS backend; visitors use the shared
# demo account via the "Try the demo" button (no signup).

on:
  push:
    branches: [main]
    paths:
      - 'app/www/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes supersede in-flight ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload web app as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/www

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
