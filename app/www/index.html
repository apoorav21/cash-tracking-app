<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback } = React;
const Backend = window.CashflowBackend;

/* ---------- helpers ---------- */
function css(str){
  const o={};
  String(str).split(';').forEach(d=>{
    const i=d.indexOf(':'); if(i<0) return;
    let k=d.slice(0,i).trim(); let v=d.slice(i+1).trim();
    if(!k) return;
    k=k.replace(/-([a-z])/g,(_,c)=>c.toUpperCase());
    o[k]=v;
  });
  return o;
}

const _now = new Date();
const TODAY = new Date(_now.getFullYear(), _now.getMonth(), _now.getDate());
const isoToday = () => `${TODAY.getFullYear()}-${String(TODAY.getMonth()+1).padStart(2,'0')}-${String(TODAY.getDate()).padStart(2,'0')}`;
const MON = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const STORE_KEY = 'cashflow.txns.v1';

const BASE_PALETTE = {
  'Ramesh Uncle':'#E5544B','Priya Shah':'#E76F51','Mehta Finance':'#C44536',
  'Suresh Patel':'#2A9D8F','Anil Verma':'#1F9488','Deepak Rao':'#36A38C',
  'Greenfield Plot':'#E9A23B',
};
const SAMPLES = [
  'Today I took 4 lakh from Ramesh Uncle at 12% for 6 months in cash',
  'I lent 2 lakh to Deepak Rao at 20% for 9 months by bank transfer',
  'Took 6 lakh from Mehta Finance at 14% for 2 years for business',
];

// Storage is namespaced per signed-in user so two accounts on one device never
// mix. uid is the Cognito `sub` (or undefined before login). New accounts start
// empty — no demo/seed rows.
const storeKey = (uid)=> STORE_KEY + (uid?(':'+uid):'');
function loadLocal(uid){
  try{ const raw=localStorage.getItem(storeKey(uid)); if(raw){ const p=JSON.parse(raw); if(Array.isArray(p)) return p; } }catch(e){}
  return [];
}
function saveLocal(uid,t){ try{ localStorage.setItem(storeKey(uid), JSON.stringify(t)); }catch(e){} }

// ---- Munshi conversations (ChatGPT/Claude-style history, stored locally) ----
const CHATS_KEY = 'cashflow_chats_v1';
const chatsKey = (uid)=> CHATS_KEY + (uid?(':'+uid):'');
function loadChats(uid){
  try{ const raw=localStorage.getItem(chatsKey(uid)); if(raw){ const p=JSON.parse(raw); if(Array.isArray(p)) return p; } }catch(e){}
  return [];
}
function saveChats(uid,c){ try{ localStorage.setItem(chatsKey(uid), JSON.stringify(c)); }catch(e){} }
const newConvId = () => 'c'+Date.now()+Math.random().toString(36).slice(2,6);
// A short title from the first user message.
const titleFrom = (msgs) => {
  const first=(msgs||[]).find(m=>m.role==='user');
  if(!first) return 'New chat';
  const t=first.content.replace(/\s+/g,' ').trim();
  return t.length>38 ? t.slice(0,38)+'…' : t;
};

const pd = s => { const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); };
const addMonths = (date,m) => { const d=new Date(date); d.setMonth(d.getMonth()+m); return d; };
const days = (a,b) => Math.round((b-a)/86400000);
const initials = name => name.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
function inr(n){ n=Math.round(n); const s=Math.abs(n).toString(); let lt=s.slice(-3),ot=s.slice(0,-3); if(ot)lt=','+lt; ot=ot.replace(/\B(?=(\d{2})+(?!\d))/g,','); return (n<0?'-':'')+'₹'+ot+lt; }
function compact(n){ const a=Math.abs(n); let s; if(a>=10000000)s=(n/10000000).toFixed(2)+' Cr'; else if(a>=100000)s=(n/100000).toFixed(2)+' L'; else if(a>=1000)s=(n/1000).toFixed(0)+'K'; else s=Math.round(n).toString(); return '₹'+s; }
function fmtDate(d){ return d.getDate()+' '+MON[d.getMonth()]+' '+d.getFullYear(); }
// Interest model — Indian "रुपया सैकड़ा" convention: rate is % PER MONTH by
// default (rateBasis 'monthly'); 'annual' rates are divided by 12. Simple
// interest, 30-day month, day-count proration. Repayments reduce the balance
// from their date onward, so early returns stop earning interest (exactly the
// कलम-wise logic in the user's chat history).
function monthlyFrac(t){ const r=(parseFloat(t.rate)||0)/100; return t.rateBasis==='annual' ? r/12 : r; }
// A repayment may split into principal returned + interest paid. Older records
// stored a single `amount` — treat that as principal for backward compatibility.
const repPrincipal = r => (r.principal!=null && r.principal!=='') ? (parseFloat(r.principal)||0) : (parseFloat(r.amount)||0);
const repInterest  = r => parseFloat(r.interest)||0;
function repaidUpTo(t,end){ return (t.repayments||[]).reduce((s,r)=> (pd(r.date)<=end ? s+repPrincipal(r) : s), 0); }
function interestPaidUpTo(t,end){ end=end||TODAY; return (t.repayments||[]).reduce((s,r)=> (pd(r.date)<=end ? s+repInterest(r) : s), 0); }
function outstanding(t,end){ end=end||TODAY; return Math.max(0,(parseFloat(t.amount)||0)-repaidUpTo(t,end)); }
const matOf = t => addMonths(pd(t.date), parseFloat(t.term)||0);
// Accrued simple interest from start to `end`, walking each repayment (principal
// portion reduces the balance from its date onward).
function accruedTo(t,end){
  if(t.kind==='asset' || !parseFloat(t.rate)) return 0;
  let cursor=pd(t.date); if(end<=cursor) return 0;
  const dr=monthlyFrac(t)/30;
  const reps=(t.repayments||[]).map(r=>({d:pd(r.date),a:repPrincipal(r)}))
    .filter(r=>r.d>cursor && r.d<=end).sort((x,y)=>x.d-y.d);
  let bal=parseFloat(t.amount)||0, interest=0;
  for(const r of reps){ interest+=bal*dr*days(cursor,r.d); bal=Math.max(0,bal-r.a); cursor=r.d; }
  interest+=bal*dr*days(cursor,end);
  return interest;
}
const isCompound = t => t.interestType==='compound';
// COMPOUND: total owed (outstanding principal + unpaid interest) to `end`, with
// interest compounding each month (मासिक चक्रवृद्धि). Repayments reduce the
// running balance from their date; the leftover keeps compounding.
function compoundOwedTo(t,end){
  if(t.kind==='asset' || !parseFloat(t.rate)) return outstanding(t,end);
  let cursor=pd(t.date); if(end<=cursor) return parseFloat(t.amount)||0;
  const mf=monthlyFrac(t);
  const evs=(t.repayments||[]).map(r=>({d:pd(r.date),paid:repPrincipal(r)+repInterest(r)}))
    .filter(r=>r.d>cursor && r.d<=end).sort((x,y)=>x.d-y.d);
  let bal=parseFloat(t.amount)||0;
  for(const e of evs){ bal*=Math.pow(1+mf, days(cursor,e.d)/30); bal=Math.max(0,bal-e.paid); cursor=e.d; }
  bal*=Math.pow(1+mf, days(cursor,end)/30);
  return bal;
}
// NET interest still owed (unpaid) at `end`, for either interest type.
function interestDueTo(t,end){
  if(t.kind==='asset' || !parseFloat(t.rate)) return 0;
  if(isCompound(t)) return Math.max(0, compoundOwedTo(t,end) - outstanding(t,end));
  return Math.max(0, accruedTo(t,end) - interestPaidUpTo(t,end));
}
// Interest owed right now (interest stops accruing at maturity for display).
function interestDue(t){ if(t.kind==='asset')return 0; const mat=matOf(t); return interestDueTo(t, TODAY<mat?TODAY:mat); }
// Total interest over the full term (net of interest already paid).
function interestFull(t){ if(t.kind==='asset')return 0; return interestDueTo(t, matOf(t)); }
// Back-compat alias used by a couple of call sites.
const accrued = (t)=> interestDue(t);
const TINT = { '#E5544B':'#FBEAE7','#E76F51':'#FBEAE7','#C44536':'#FBEAE7','#2A9D8F':'#E4F2EF','#1F9488':'#E4F2EF','#36A38C':'#E4F2EF','#E9A23B':'#FBF1DC' };
const tintFor = c => TINT[c] || '#f1ece3';

// Colour that represents a *person's* net position (borrowed=red, lent=green,
// asset=amber). Unlike the name-based palette this is always live, so a person
// flips colour the moment their balance flips (e.g. a lent loan is deleted and
// only a borrowing remains). Use this wherever the whole person is shown.
const KIND_COLOR = { borrowed:'#E5544B', lent:'#2A9D8F', asset:'#E9A23B' };

// Property / asset metadata.
const ASSET_TYPES = [['plot','Plot'],['flat','Flat'],['land','Land'],['house','House'],['commercial','Commercial'],['gold','Gold'],['silver','Silver'],['other','Other']];
const ASSET_ICON = { plot:'🗺️', flat:'🏢', land:'🌾', house:'🏠', commercial:'🏬', gold:'🪙', silver:'🥈', other:'📦' };
const AREA_UNITS = [['sqft','sq ft'],['gaj','gaj'],['sqyd','sq yd'],['sqm','sq m'],['acre','acre'],['bigha','bigha'],['marla','marla']];
const unitLabel = (u)=> (AREA_UNITS.find(x=>x[0]===u)||['','sq ft'])[1];
const assetTypeLabel = (s)=> (ASSET_TYPES.find(x=>x[0]===s)||['','Property'])[1];
// Total paid toward an asset (sum of instalments); falls back to nothing.
const assetPaid = (t)=> (t.payments||[]).reduce((s,p)=>s+(parseFloat(p.amount)||0),0);
function personNet(txns, party){
  let lend=0, borrow=0, asset=0, hasDebt=false;
  txns.filter(t=>t.party===party).forEach(t=>{
    if(t.kind==='asset'){ asset+=(parseFloat(t.amount)||0); return; }
    hasDebt=true;
    const v=outstanding(t)+interestDue(t);
    if(t.kind==='lent') lend+=v; else borrow+=v;
  });
  const kind = hasDebt ? (lend>=borrow ? 'lent' : 'borrowed') : 'asset';
  return { kind, color:KIND_COLOR[kind], lend, borrow, asset, net: kind==='asset'?asset:Math.abs(lend-borrow) };
}

/* ---------- offline NL parser (fallback when Bedrock unavailable) ---------- */
function parseLocal(text){
  const t=' '+text.toLowerCase()+' ';
  let kind='borrowed';
  if(/\b(lent|lend|gave|give|loaned to|loan to)\b/.test(t)) kind='lent';
  if(/\b(bought|purchase|purchased|property|plot|land|flat|house)\b/.test(t)) kind='asset';
  else if(/\b(took|take|borrow|borrowed|got)\b/.test(t)) kind='borrowed';
  let amount='';
  let m=t.match(/(\d+(?:\.\d+)?)\s*(crore|cr)\b/);
  if(m) amount=parseFloat(m[1])*10000000;
  else if((m=t.match(/(\d+(?:\.\d+)?)\s*(lakh|lac|lakhs|l)\b/))) amount=parseFloat(m[1])*100000;
  else if((m=t.match(/(\d+(?:\.\d+)?)\s*(thousand|k)\b/))) amount=parseFloat(m[1])*1000;
  else if((m=t.match(/(?:rs\.?|₹|inr)\s*(\d[\d,]*)/))) amount=parseFloat(m[1].replace(/,/g,''));
  else if((m=t.match(/\b(\d{4,})\b/))) amount=parseFloat(m[1]);
  // "रुपया सैकड़ा" words → monthly %. "do/dedh/sava/paune" map to 2/1.5/1.25/1.75.
  let rate='';
  const SAIKDA={ 'do':2,'dedh':1.5,'sava':1.25,'paune do':1.75,'paune':0.75,'ek':1,'sawa':1.25,'dhai':2.5,'adha':0.5 };
  let sm=t.match(/(paune do|sava|sawa|dedh|dhai|do|ek|adha|paune)\s+(?:rupa?ye?a?|rupee)?\s*(?:saikda|sainkda|sekda)/);
  if(sm) rate=SAIKDA[sm[1]]!=null?SAIKDA[sm[1]]:'';
  if(rate===''){ m=t.match(/(\d+(?:\.\d+)?)\s*(?:%|percent|per cent|rupaye? saikda|rupaye? sainkda|saikda|sainkda)/); if(m)rate=parseFloat(m[1]); }
  // Basis: default monthly (सैकड़ा). Annual only if explicitly per-annum/yearly.
  let rateBasis='monthly';
  if(/\b(per annum|p\.?\s*a\.?|annual|annually|yearly|per year)\b/.test(t)) rateBasis='annual';
  // Interest type: simple by default; compound if stated (chakravriddhi / compound).
  let interestType='simple';
  if(/\b(compound|chakravriddhi|chakra|chakwriddhi)\b/.test(t) || /चक्रवृद्धि|चक्रवर्ती/.test(text)) interestType='compound';
  let term=''; m=t.match(/(\d+)\s*(?:months?|mo|mahin[ae]|mahine)\b/); if(m)term=parseFloat(m[1]);
  else if((m=t.match(/(\d+)\s*(?:years?|yrs?|yr)\b/))) term=parseFloat(m[1])*12;
  let party=''; m=text.match(/\b(?:from|to)\s+([A-Z][A-Za-z]*(?:\s+[A-Z][A-Za-z]*){0,2})/);
  if(m) party=m[1].replace(/\s+(at|for|in|by|on)$/i,'').trim();
  let method='cash';
  if(/\b(bank|transfer|upi|cheque|check|neft|imps|account|online)\b/.test(t)) method='bank';
  let purpose=''; m=text.match(/\bfor\s+([a-z][a-z\s]+?)(?:\s+(?:at|in|by|for|on)\b|$)/i);
  if(m && !/\d/.test(m[1])) purpose=m[1].trim().replace(/\s+\d+.*$/,'');
  const td=TODAY;
  const ds=td.getFullYear()+'-'+String(td.getMonth()+1).padStart(2,'0')+'-'+String(td.getDate()).padStart(2,'0');
  return { kind, amount:amount||'', party:party||'', rate:rate===''?'':rate, rateBasis, interestType, term:term===''?'':term,
    method, date:ds, purpose:purpose?(purpose[0].toUpperCase()+purpose.slice(1)):'', notes:'' };
}
// Normalise a draft object so every field is a string the inputs can edit.
function draftFrom(d){
  if(!d) return null;
  return {
    kind:['borrowed','lent','asset'].includes(d.kind)?d.kind:'borrowed',
    party:d.party!=null?String(d.party):'',
    amount:d.amount!=null&&d.amount!==''?String(d.amount):'',
    rate:d.rate!=null&&d.rate!==''?String(d.rate):'',
    rateBasis:d.rateBasis==='annual'?'annual':'monthly',
    interestType:d.interestType==='compound'?'compound':'simple',
    term:d.term!=null&&d.term!==''?String(d.term):'',
    method:d.method==='bank'?'bank':'cash',
    date:d.date||TODAY.toISOString().slice(0,10),
    purpose:d.purpose!=null?String(d.purpose):'',
    notes:d.notes!=null?String(d.notes):'',
    // Asset / property fields
    subtype:d.subtype||'plot',
    area:d.area!=null&&d.area!==''?String(d.area):'',
    areaUnit:d.areaUnit||'sqft',
    location:d.location!=null?String(d.location):'',
    marketValue:d.marketValue!=null&&d.marketValue!==''?String(d.marketValue):'',
    rent:d.rent!=null&&d.rent!==''?String(d.rent):'',
    nextDue:d.nextDue||'',
    // Existing instalments (editable when editing an asset)
    payments: Array.isArray(d.payments) ? d.payments.map(p=>({ date:p.date||'', amount:p.amount!=null?String(p.amount):'', method:p.method==='bank'?'bank':'cash', note:p.note||'' })) : [],
    // Purchase split — only used when creating a new asset (seeds instalments)
    payCash:'',
    payBank:'',
  };
}

const chipStyle = (active) => `border-radius:20px;padding:8px 15px;font-size:13px;font-weight:800;cursor:pointer;background:${active?'#2A2420':'#fff'};color:${active?'#fff':'#8C8278'};border:1px solid ${active?'#2A2420':'#ece4d8'};`;
const segStyle = (active,accent) => `flex:1;border-radius:13px;padding:11px 0;font-size:13px;font-weight:800;cursor:pointer;background:${active?accent:'#fff'};color:${active?'#fff':'#8C8278'};border:1.5px solid ${active?accent:'#ece4d8'};`;
const seg2Style = (active) => `border:none;border-radius:9px;padding:7px 16px;font-size:13px;font-weight:800;cursor:pointer;background:${active?'#fff':'transparent'};color:${active?'#2A2420':'#a89f93'};box-shadow:${active?'0 1px 4px rgba(0,0,0,.12)':'none'};`;

const ACCENT = '#F2784B';
const ACCENT_SHADOW = 'rgba(242,120,75,.55)';

/* ============================================================= */
function App({ user, onSignOut }){
  const uid = user && user.sub;
  const [txns, setTxns] = useState(()=>loadLocal(uid));
  const [screen, setScreen] = useState('home');
  const [back, setBack] = useState('people');
  const [detailParty, setDetailParty] = useState(null);
  const [filter, setFilter] = useState('all');
  const [heroStyle, setHeroStyle] = useState('ring');
  const [syncing, setSyncing] = useState(false);

  const [addOpen, setAddOpen] = useState(false);
  const [addStep, setAddStep] = useState('capture');
  const [typed, setTyped] = useState('');
  const [transcript, setTranscript] = useState('');
  const [draft, setDraft] = useState(null);
  const [aiThinking, setAiThinking] = useState(false);
  const [listenError, setListenError] = useState('');
  const [editingId, setEditingId] = useState(null);     // non-null => editing an existing txn
  const [repayFor, setRepayFor] = useState(null);        // txn being repaid (modal)
  const [repayDraft, setRepayDraft] = useState({ amount:'', date:isoToday(), method:'cash', note:'' });
  const [instFor, setInstFor] = useState(null);          // asset being paid an instalment (modal)
  const [instDraft, setInstDraft] = useState({ amount:'', pct:'', date:isoToday(), method:'cash', note:'' });
  const [confirmDelete, setConfirmDelete] = useState(null); // txn pending delete
  // Assistant (Munshi) — conversations (ChatGPT/Claude-style history)
  const [convs, setConvs] = useState(()=>loadChats(uid));        // [{id,title,msgs,createdAt,updatedAt}]
  const [activeConv, setActiveConv] = useState(null);    // id of open conversation, or null => list
  const [chatInput, setChatInput] = useState('');
  const [chatBusy, setChatBusy] = useState(false);
  const [chatListening, setChatListening] = useState(false);
  const [chatTranscribing, setChatTranscribing] = useState(false);
  const [recSecs, setRecSecs] = useState(0);
  const recTimer = useRef(null);
  const [copied, setCopied] = useState(false);
  const [toast, setToast] = useState('');
  const toastTimer = useRef(null);
  const [pwOpen, setPwOpen] = useState(false);
  const [pwOld, setPwOld] = useState('');
  const [pwNew, setPwNew] = useState('');
  const [pwBusy, setPwBusy] = useState(false);
  const [pwErr, setPwErr] = useState('');
  const chatRecRef = useRef(null);
  const chatScrollRef = useRef(null);
  const micIdx = useRef(0);
  const recRef = useRef(null);
  const simTimers = useRef([]);
  const paletteRef = useRef({ ...BASE_PALETTE });

  // Load from cloud (DynamoDB) on mount; fall back to local cache.
  useEffect(()=>{
    let alive = true;
    (async ()=>{
      if(Backend?.apiConfigured){
        setSyncing(true);
        try{
          const remote = await Backend.listTxns();
          if(alive && remote){
            // Register colours for any unknown parties.
            remote.forEach(t=>{ if(!paletteRef.current[t.party]) paletteRef.current[t.party]= t.kind==='lent'?'#2A9D8F':t.kind==='asset'?'#E9A23B':'#E5544B'; });
            setTxns(remote);
          }
        }catch(e){ /* keep local cache */ }
        finally{ if(alive) setSyncing(false); }
      }
    })();
    return ()=>{ alive=false; };
  }, []);

  // Mirror to local cache for offline use.
  useEffect(()=>{ saveLocal(uid, txns); }, [txns]);

  const showToast = (msg) => { setToast(msg); if(toastTimer.current) clearTimeout(toastTimer.current); toastTimer.current=setTimeout(()=>setToast(''), 2200); };
  const openChangePw = () => { setPwOld(''); setPwNew(''); setPwErr(''); setPwOpen(true); };
  const doChangePw = async () => {
    setPwErr('');
    if((pwNew||'').length<6){ setPwErr('New password must be at least 6 characters.'); return; }
    setPwBusy(true);
    try{ await Backend.changePassword({ oldPassword:pwOld, newPassword:pwNew }); setPwOpen(false); showToast('Password changed ✓'); }
    catch(e){ const m=(e&&e.message)||''; setPwErr(/NotAuthorized|Incorrect/i.test(m)?'Current password is wrong.':/InvalidPassword|InvalidParameter/i.test(m)?'New password must be at least 6 characters.':/LimitExceeded/i.test(m)?'Too many attempts — try later.':(m||'Could not change password.')); }
    finally{ setPwBusy(false); }
  };
  const pColor = useCallback((p)=> paletteRef.current[p] || '#7c6f5f', []);
  const clearSim = () => { simTimers.current.forEach(clearTimeout); simTimers.current=[]; };
  useEffect(()=>()=>{ clearSim(); if(recRef.current) try{recRef.current.stop();}catch(e){} }, []);

  const openParty = (p) => { setBack(screen); setDetailParty(p); setScreen('detail'); };
  const setDraftField = (k,v) => setDraft(d => ({...d, [k]:v}));
  // Editing an asset's instalment rows in the draft.
  const setPayField = (i,k,v) => setDraft(d => { const ps=[...(d.payments||[])]; ps[i]={...ps[i],[k]:v}; return {...d, payments:ps}; });
  const addPayRow = () => setDraft(d => ({...d, payments:[...(d.payments||[]), { date:d.date||isoToday(), amount:'', method:'cash', note:'' }]}));
  const removePayRow = (i) => setDraft(d => { const ps=[...(d.payments||[])]; ps.splice(i,1); return {...d, payments:ps}; });

  // Upsert a transaction: optimistic local update + cloud save (PutCommand
  // overwrites by txnId, so the same call handles both add and edit).
  const persistTxn = useCallback(async (txn) => {
    if(!paletteRef.current[txn.party]) paletteRef.current[txn.party]= txn.kind==='lent'?'#2A9D8F':txn.kind==='asset'?'#E9A23B':'#E5544B';
    setTxns(prev => prev.some(t=>t.id===txn.id) ? prev.map(t=>t.id===txn.id?txn:t) : [txn, ...prev]);
    if(Backend?.apiConfigured){
      try{ const saved = await Backend.addTxn(txn); if(saved) setTxns(prev => prev.map(t => t.id===txn.id ? saved : t)); }
      catch(e){ /* stays in local cache; reconciles on next load */ }
    }
  }, []);

  const removeTxn = useCallback(async (txn) => {
    setTxns(prev => prev.filter(t => t.id !== txn.id));
    if(detailParty){ const others = txns.filter(t=>t.party===detailParty && t.id!==txn.id); if(!others.length){ setScreen(back||'people'); setDetailParty(null); } }
    if(Backend?.apiConfigured){ try{ await Backend.deleteTxn(txn.id); }catch(e){} }
  }, [detailParty, txns, back]);

  // Open the add-sheet pre-filled with an existing txn for editing.
  const editTxn = (t) => {
    setEditingId(t.id);
    setDraft(draftFrom({ ...t, amount:t.amount, rate:t.rate, term:t.term }));
    setTranscript(''); setListenError(''); setAiThinking(false);
    setAddStep('preview'); setAddOpen(true);
  };

  const openRepay = (t) => { setRepayFor(t); setRepayDraft({ principal:'', interest:'', date:isoToday(), method:'cash', note:'' }); };
  const saveRepay = async () => {
    const t = repayFor;
    const principal = parseFloat(repayDraft.principal)||0;
    const interest = parseFloat(repayDraft.interest)||0;
    if(!t || (principal<=0 && interest<=0)){ setRepayFor(null); return; }
    const rep = { date:repayDraft.date||isoToday(), principal, interest, amount:principal+interest,
      method:repayDraft.method||'cash', note:(repayDraft.note||'').trim() };
    const updated = { ...t, repayments:[...(t.repayments||[]), rep] };
    setRepayFor(null);
    await persistTxn(updated);
    showToast(t.kind==='lent'?'किश्त दर्ज हो गई ✓':'Repayment saved ✓');
  };
  // Asset instalments — record a payment made toward a property.
  const openInstallment = (t) => { setInstFor(t); setInstDraft({ amount:'', pct:'', date:isoToday(), method:'cash', note:'' }); };
  const saveInstallment = async () => {
    const t = instFor;
    const amount = parseFloat(instDraft.amount)||0;
    if(!t || amount<=0){ setInstFor(null); return; }
    const pay = { date:instDraft.date||isoToday(), amount, method:instDraft.method||'cash', note:(instDraft.note||'').trim() };
    const updated = { ...t, payments:[...(t.payments||[]), pay] };
    setInstFor(null);
    await persistTxn(updated);
    showToast('किश्त दर्ज हो गई ✓ · Installment saved');
  };

  // Interest owed up to a given date, after a hypothetical principal payment now.
  const interestTillToday = (t) => Math.round(interestDue(t));

  const openAdd = () => { setEditingId(null); setAddOpen(true); setAddStep('capture'); setTyped(''); setTranscript(''); setDraft(null); setListenError(''); setAiThinking(false); };
  const closeAdd = () => { clearSim(); if(recRef.current) try{recRef.current.stop();}catch(e){} setAddOpen(false); setEditingId(null); };

  // Refine an offline draft with the streaming Bedrock parser, merging non-empty fields.
  const refineWithAI = async (text) => {
    if(!Backend?.parseText) return;
    setAiThinking(true);
    try{
      const ai = await Backend.parseText(text, ()=>{});
      if(ai){
        setDraft(prev => {
          const base = prev || draftFrom(parseLocal(text));
          const merged = { ...base };
          ['kind','method'].forEach(k=>{ if(ai[k]) merged[k]=ai[k]; });
          ['party','purpose','notes'].forEach(k=>{ if(ai[k]!=null && String(ai[k]).trim()!=='') merged[k]=String(ai[k]); });
          ['amount','rate','term'].forEach(k=>{ if(ai[k]!=null && ai[k]!=='' && Number(ai[k])>0) merged[k]=String(ai[k]); });
          if(ai.date) merged.date=ai.date;
          // Asset / property fields
          if(ASSET_TYPES.find(x=>x[0]===ai.subtype)) merged.subtype=ai.subtype;
          if(AREA_UNITS.find(x=>x[0]===ai.areaUnit)) merged.areaUnit=ai.areaUnit;
          ['area','marketValue','rent'].forEach(k=>{ if(ai[k]!=null && ai[k]!=='' && Number(ai[k])>0) merged[k]=String(ai[k]); });
          if(ai.location!=null && String(ai.location).trim()!=='') merged.location=String(ai.location);
          if(ai.nextDue) merged.nextDue=ai.nextDue;
          return merged;
        });
      }
    }catch(e){ /* keep offline draft */ }
    finally{ setAiThinking(false); }
  };

  // Demo dictation when no STT backend is available.
  const simulateListen = () => {
    const sample = SAMPLES[micIdx.current % SAMPLES.length];
    micIdx.current++;
    setAddStep('listen'); setTranscript('');
    const words = sample.split(' ');
    let i=0;
    const step = () => {
      i++; setTranscript(words.slice(0,i).join(' '));
      if(i<words.length){ simTimers.current.push(setTimeout(step,85)); }
      else { simTimers.current.push(setTimeout(()=>goPreview(sample), 500)); }
    };
    simTimers.current.push(setTimeout(step,85));
  };

  const goPreview = (text) => {
    if(!text || !text.trim()){ setAddStep('capture'); return; }
    setTranscript(text);
    setDraft(draftFrom(parseLocal(text))); // instant draft
    setAddStep('preview');
    refineWithAI(text);                      // then AI refinement
  };

  const startListen = async () => {
    setListenError('');
    setAddStep('listen'); setTranscript('');
    try{
      const ctrl = await Backend.startTranscribe({
        onStatus:(s)=>{ if(s==='silent') setListenError('कुछ सुनाई नहीं दिया — दोबारा बोलें'); else setTranscript(s==='transcribing' ? 'लिख रहा हूँ… · transcribing…' : '🎙️ सुन रहा हूँ… · tap mic to stop'); },
        onPartial: (t)=> setTranscript(t),
        onFinal: (t)=> goPreview(t),
        onError: (e)=> setListenError('Voice: '+(e?.message||'error')),
      });
      recRef.current = ctrl;
      if(ctrl.unavailable){ recRef.current=null; simulateListen(); }
    }catch(e){
      setListenError('Voice unavailable — showing a demo.');
      simulateListen();
    }
  };
  const stopListen = () => { if(recRef.current){ try{recRef.current.stop();}catch(e){} } };

  const parseTyped = () => { const t=typed.trim(); if(!t) return; goPreview(t); };

  const confirmAdd = async () => {
    const d = draft;
    const existing = editingId ? txns.find(t=>t.id===editingId) : null;
    const txn = { id: editingId || `${Date.now()}`, kind:d.kind, party:(d.party||'Unknown').trim(),
      amount:parseFloat(d.amount)||0, date:d.date, rate:parseFloat(d.rate)||0,
      rateBasis:d.rateBasis==='annual'?'annual':'monthly',
      interestType:d.interestType==='compound'?'compound':'simple',
      term:parseFloat(d.term)||0, method:d.method, purpose:d.purpose||'', notes:d.notes||'',
      repayments: existing?.repayments || [] };
    if(d.kind==='asset'){
      txn.subtype=d.subtype||'plot'; txn.area=parseFloat(d.area)||0; txn.areaUnit=d.areaUnit||'sqft';
      txn.location=(d.location||'').trim(); txn.marketValue=parseFloat(d.marketValue)||0; txn.rent=parseFloat(d.rent)||0;
      txn.nextDue=d.nextDue||'';
      if(existing){
        // Keep the (possibly edited) instalment rows from the draft.
        txn.payments = (d.payments||[]).map(p=>({ date:p.date||d.date, amount:parseFloat(p.amount)||0, method:p.method==='bank'?'bank':'cash', note:(p.note||'').trim() })).filter(p=>p.amount>0);
      } else {
        // Seed instalments from the "paid at purchase" cash/bank split.
        const c=parseFloat(d.payCash)||0, b=parseFloat(d.payBank)||0, pays=[];
        if(c>0) pays.push({ date:d.date, amount:c, method:'cash', note:'At purchase' });
        if(b>0) pays.push({ date:d.date, amount:b, method:'bank', note:'At purchase' });
        txn.payments = pays;
      }
    }
    const wasEdit = !!editingId;
    setAddOpen(false); setEditingId(null);
    if(!editingId){ setScreen('activity'); setFilter('all'); }
    await persistTxn(txn);
    showToast(wasEdit?'Transaction updated ✓':'Transaction saved ✓');
  };

  /* ---------- Assistant (Munshi) ---------- */
  const MARK = '<<<ACTION>>>';
  // Strip every special block (action + statement) from the visible answer.
  const stripBlocks = (s) => {
    let out = s;
    const a = out.indexOf(MARK); if(a>=0) out = out.slice(0,a);
    out = out.replace(/<<<STATEMENT>>>[\s\S]*?(?:<<<ENDSTATEMENT>>>|$)/g, '');
    return out.replace(/<<<ENDSTATEMENT>>>/g,'').trim();
  };
  // Split the streamed wire format into the model's reasoning and its answer.
  const splitReply = (acc) => {
    const ri = acc.indexOf('<<<REPLY>>>');
    if(ri>=0) return { think:acc.slice(0,ri).replace('<<<THINK>>>','').trim(), answer:acc.slice(ri+'<<<REPLY>>>'.length) };
    return { think:acc.replace('<<<THINK>>>','').trim(), answer:'' };
  };
  const parseAction = (s) => {
    const i=s.indexOf(MARK); if(i<0) return null;
    const m=s.slice(i+MARK.length).match(/\{[\s\S]*\}/); if(!m) return null;
    try{ const a=JSON.parse(m[0]); return (a && a.type) ? a : null; }catch(e){ return null; }
  };
  // Extract a complete shareable-statement block, if any.
  const parseStatement = (s) => {
    const m = s.match(/<<<STATEMENT>>>([\s\S]*?)<<<ENDSTATEMENT>>>/);
    return m ? m[1].trim() : null;
  };
  // Render **bold** markdown inline so the model's asterisks become real bold
  // text instead of showing literal stars.
  const renderRich = (text) => {
    const s = String(text==null?'':text);
    return s.split(/(\*\*[^*\n]+\*\*)/g).map((p,i)=> (p.length>4 && p.startsWith('**') && p.endsWith('**'))
      ? <strong key={i} style={css("font-weight:900;")}>{p.slice(2,-2)}</strong>
      : <React.Fragment key={i}>{p}</React.Fragment>);
  };
  const slim = (t)=>({ kind:t.kind, party:t.party, amount:t.amount, rate:t.rate, rateBasis:t.rateBasis||'monthly', interestType:t.interestType||'simple', term:t.term, date:t.date, method:t.method, purpose:t.purpose, repayments:(t.repayments||[]).map(r=>({date:r.date, principal:repPrincipal(r), interest:repInterest(r)})) });
  const errLine = (s)=> /__ERROR__/.test(s||'') && /429|too many|quota|rate.?limit/i.test(s||'')
    ? '⚠️ अभी AI की लिमिट आ गई है (rate limit). थोड़ी देर बाद दोबारा कोशिश करें — बाकी ऐप पूरा चलता रहेगा।'
    : '⚠️ अभी जवाब नहीं मिल पाया। थोड़ी देर बाद कोशिश करें।';

  // ----- conversation helpers -----
  const active = convs.find(c=>c.id===activeConv) || null;
  const chatMsgs = active ? active.msgs : [];
  // Update the active conversation's messages (updater gets the current msgs).
  const setChatMsgs = (updater) => setConvs(prev => prev.map(c => c.id!==activeConv ? c
    : { ...c, msgs: typeof updater==='function' ? updater(c.msgs) : updater, updatedAt: Date.now(), title: (c.title && c.title!=='New chat') ? c.title : titleFrom(typeof updater==='function'?updater(c.msgs):updater) }));
  const newChat = () => { const id=newConvId(); setConvs(prev=>[{ id, title:'New chat', msgs:[], createdAt:Date.now(), updatedAt:Date.now() }, ...prev.filter(c=>c.msgs && c.msgs.length)]); setActiveConv(id); setChatInput(''); return id; };
  const openConv = (id) => { setActiveConv(id); };
  const deleteConv = (id) => { setConvs(prev=>prev.filter(c=>c.id!==id)); if(activeConv===id) setActiveConv(null); };
  // Return to the list, discarding the current chat if it's still empty.
  const closeConv = () => { setConvs(prev=>prev.filter(c=> c.id!==activeConv || (c.msgs && c.msgs.length))); setActiveConv(null); };

  // Android hardware / gesture back button → navigate within the app (like the
  // in-app ‹ arrows) instead of quitting. Fires for both 3-button and gesture nav.
  const handleBack = () => {
    if(confirmDelete){ setConfirmDelete(null); return; }
    if(instFor){ setInstFor(null); return; }
    if(repayFor){ setRepayFor(null); return; }
    if(pwOpen){ setPwOpen(false); return; }
    if(addOpen){ closeAdd(); return; }
    if(screen==='detail'){ setScreen(back||'people'); setDetailParty(null); return; }
    if(screen==='assistant' && active){ closeConv(); return; }
    if(screen!=='home'){ setScreen('home'); return; }
    // Home, nothing open → let Android exit/minimise the app.
    try{ window.Capacitor?.Plugins?.App?.exitApp?.(); }catch(e){}
  };
  const backRef = useRef(handleBack); backRef.current = handleBack;
  useEffect(()=>{
    const A = window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.App;
    if(!A || !A.addListener) return;                 // browser / no native shell → in-app arrows only
    let handle;
    const p = A.addListener('backButton', ()=>{ backRef.current(); });
    Promise.resolve(p).then(h=>{ handle=h; });
    return ()=>{ Promise.resolve(p).then(h=>{ const rm=(h&&h.remove)||(handle&&handle.remove); if(rm) rm.call(h||handle); }); };
  }, []);

  const copyText = async (t) => {
    try{ await navigator.clipboard.writeText(t); }
    catch(e){ const ta=document.createElement('textarea'); ta.value=t; document.body.appendChild(ta); ta.select(); try{document.execCommand('copy');}catch(_){} ta.remove(); }
    setCopied(true); setTimeout(()=>setCopied(false), 1500);
  };
  // Share to WhatsApp / system share sheet.
  const shareText = async (t) => {
    try{ if(navigator.share){ await navigator.share({ text:t }); return; } }catch(e){ if(e && e.name==='AbortError') return; }
    window.open('https://wa.me/?text='+encodeURIComponent(t), '_blank');
  };

  const sendChat = async (text) => {
    const q=(text||'').trim(); if(!q || chatBusy) return;
    // Ensure there's an active conversation to write into.
    let convId = activeConv;
    if(!convId){ convId=newConvId(); setConvs(prev=>[{ id:convId, title:titleFrom([{role:'user',content:q}]), msgs:[], createdAt:Date.now(), updatedAt:Date.now() }, ...prev]); setActiveConv(convId); }
    const writeMsgs = (updater) => setConvs(prev => prev.map(c => c.id!==convId ? c
      : { ...c, msgs: typeof updater==='function'?updater(c.msgs):updater, updatedAt:Date.now(), title:(c.title && c.title!=='New chat')?c.title:titleFrom(typeof updater==='function'?updater(c.msgs):updater) }));
    const prior = (convs.find(c=>c.id===convId)?.msgs)||[];
    if(!Backend?.chatText){ writeMsgs([...prior,{role:'user',content:q},{role:'assistant',content:'Assistant needs the cloud — set chatUrl in config.js.'}]); setChatInput(''); return; }
    const history=[...prior.filter(m=>m.role==='user'||m.role==='assistant'), {role:'user',content:q}];
    writeMsgs([...history, {role:'assistant',content:''}]);
    setChatInput(''); setChatBusy(true);
    const ctx = txns.map(slim);
    let acc='';
    const res = await Backend.chatText(
      { messages: history.map(m=>({role:m.role,content:m.content})), transactions:ctx, today:isoToday() },
      (a)=>{ acc=a; const {think,answer}=splitReply(a); writeMsgs(prev=>{ const c=[...prev]; c[c.length-1]={role:'assistant',content:stripBlocks(answer),reasoning:think}; return c; }); }
    );
    const finalText = (res!=null?res:acc) || '';
    const { think, answer } = splitReply(finalText);
    const visible = stripBlocks(answer);
    const action = parseAction(answer);
    const statement = parseStatement(answer);
    writeMsgs(prev=>{ const c=[...prev]; c[c.length-1] = (!finalText || /__ERROR__/.test(answer) || res==null)
      ? {role:'assistant',content:errLine(answer||finalText)}
      : {role:'assistant',content:visible || (statement?'':'हो गया।'), reasoning:think, action, statement}; return c; });
    setChatBusy(false);
  };

  // Find which existing transaction an edit action targets (party + optional
  // amount/date/method hints; falls back to the latest for that party).
  const findEditTarget = (action) => {
    if(!action || action.type!=='edit' || !action.party) return null;
    const mt = action.match||{};
    let cand = txns.filter(x=>x.party && x.party.toLowerCase()===String(action.party).toLowerCase());
    if(mt.amount!=null){ const f=cand.filter(x=>Math.abs((parseFloat(x.amount)||0)-(parseFloat(mt.amount)||0))<1); if(f.length) cand=f; }
    if(mt.date){ const f=cand.filter(x=>x.date===mt.date); if(f.length) cand=f; }
    if(mt.method){ const f=cand.filter(x=>x.method===mt.method); if(f.length) cand=f; }
    return cand.sort((x,y)=>pd(y.date)-pd(x.date))[0] || null;
  };
  // Apply an edit action's `changes` onto a transaction, returning the new txn.
  const applyEditChanges = (t, c={}) => ({ ...t,
    ...(c.kind&&['borrowed','lent','asset'].includes(c.kind)?{kind:c.kind}:{}),
    ...(c.party!=null?{party:String(c.party).trim()}:{}),
    ...(c.amount!=null?{amount:parseFloat(c.amount)||0}:{}), ...(c.rate!=null?{rate:parseFloat(c.rate)||0}:{}),
    ...(c.rateBasis?{rateBasis:c.rateBasis==='annual'?'annual':'monthly'}:{}), ...(c.interestType?{interestType:c.interestType==='compound'?'compound':'simple'}:{}), ...(c.term!=null?{term:parseFloat(c.term)||0}:{}),
    ...(c.method?{method:c.method==='bank'?'bank':'cash'}:{}), ...(c.purpose!=null?{purpose:c.purpose}:{}),
    ...(c.notes!=null?{notes:c.notes}:{}), ...(c.date?{date:c.date}:{}) });

  // Normalise one assistant-proposed txn into our shape.
  const txnFromAction = (a, idx=0) => { const kind=['borrowed','lent','asset'].includes(a.kind)?a.kind:'lent';
    const base={ id:`${Date.now()}${idx}`, kind,
      party:(a.party||'Unknown').trim(), amount:parseFloat(a.amount)||0, date:a.date||isoToday(),
      rate:parseFloat(a.rate)||0, rateBasis:a.rateBasis==='annual'?'annual':'monthly',
      interestType:a.interestType==='compound'?'compound':'simple', term:parseFloat(a.term)||0,
      method:a.method==='bank'?'bank':'cash', purpose:a.purpose||'', notes:a.notes||'', repayments:[] };
    if(kind==='asset'){
      base.subtype=(ASSET_TYPES.find(x=>x[0]===a.subtype)?a.subtype:'plot');
      base.area=parseFloat(a.area)||0; base.areaUnit=(AREA_UNITS.find(x=>x[0]===a.areaUnit)?a.areaUnit:'sqft');
      base.location=a.location||''; base.marketValue=parseFloat(a.marketValue)||0; base.rent=parseFloat(a.rent)||0; base.nextDue=a.nextDue||'';
      // Munshi may pass a purchase split as payments[] {amount,method,note} or cash/bank shortcuts.
      let pays = Array.isArray(a.payments) ? a.payments.map(p=>({ date:p.date||base.date, amount:parseFloat(p.amount)||0, method:p.method==='bank'?'bank':'cash', note:p.note||'At purchase' })).filter(p=>p.amount>0) : [];
      if(!pays.length){ const c=parseFloat(a.paidCash)||0, b=parseFloat(a.paidBank)||0; if(c>0)pays.push({date:base.date,amount:c,method:'cash',note:'At purchase'}); if(b>0)pays.push({date:base.date,amount:b,method:'bank',note:'At purchase'}); }
      base.payments=pays;
    }
    return base; };

  // Apply an assistant-proposed action after the user taps Confirm. Guards against
  // double-tap (idempotent on the message's `applied` flag).
  const applyAction = async (msgIdx, action) => {
    if(!action) return;
    const cur = chatMsgs[msgIdx];
    if(cur && cur.applied) return;                 // already saved — no duplicates
    // Mark applied immediately so a second tap is a no-op.
    setChatMsgs(prev=>{ const c=[...prev]; if(c[msgIdx]) c[msgIdx]={...c[msgIdx], applied:true}; return c; });
    let note='Saved ✓';
    try{
      if(action.type==='add'){
        const list = Array.isArray(action.txns) ? action.txns : (action.txn ? [action.txn] : []);
        for(let i=0;i<list.length;i++) await persistTxn(txnFromAction(list[i], i));
        note = list.length>1 ? `${list.length} transactions saved ✓` : 'Transaction saved ✓';
      } else if(action.type==='repayment'){
        const t=[...txns].filter(x=>x.party && action.party && x.party.toLowerCase()===String(action.party).toLowerCase() && x.kind!=='asset')
          .sort((x,y)=>pd(y.date)-pd(x.date))[0];
        if(t){
          const principal=parseFloat(action.principal)||0;
          let interest=parseFloat(action.interest)||0;
          if(action.interestTillToday && interest<=0) interest=Math.round(interestDue(t));
          await persistTxn({ ...t, repayments:[...(t.repayments||[]), { date:action.date||isoToday(), principal, interest, amount:principal+interest, method:action.method==='bank'?'bank':'cash', note:action.note||'' }] });
          note='Repayment saved ✓';
        } else note='No matching loan found';
      } else if(action.type==='installment'){
        const t=[...txns].filter(x=>x.kind==='asset' && x.party && action.party && x.party.toLowerCase()===String(action.party).toLowerCase())
          .sort((x,y)=>pd(y.date)-pd(x.date))[0];
        if(t){
          let amount=parseFloat(action.amount)||0;
          const pct=parseFloat(action.percent)||0;
          if(amount<=0 && pct>0) amount=Math.round((parseFloat(t.amount)||0)*pct/100);
          if(amount>0){
            await persistTxn({ ...t, payments:[...(t.payments||[]), { date:action.date||isoToday(), amount, method:action.method==='bank'?'bank':'cash', note:action.note||'' }] });
            note='Installment saved ✓';
          } else note='No amount for the installment';
        } else note='No matching property found';
      } else if(action.type==='edit' && action.changes){
        const t=findEditTarget(action);
        if(t){ await persistTxn(applyEditChanges(t, action.changes)); note='Updated ✓'; }
        else note='No matching transaction found';
      }
      showToast(note);
    }catch(e){
      // Roll back the applied flag so the user can retry.
      setChatMsgs(prev=>{ const c=[...prev]; if(c[msgIdx]) c[msgIdx]={...c[msgIdx], applied:false}; return c; });
      showToast('Save failed — try again');
    }
  };

  // Load an assistant-proposed add into the manual add sheet so the user can edit
  // before saving. Works for a single-txn action.
  const editAction = (action) => {
    const a = (action && (Array.isArray(action.txns)?action.txns[0]:action.txn)) || null;
    if(!a) return;
    setEditingId(null);
    setDraft(draftFrom(a));
    setTranscript(''); setListenError(''); setAiThinking(false);
    setAddStep('preview'); setAddOpen(true);
  };

  const stopRecTimer = () => { if(recTimer.current){ clearInterval(recTimer.current); recTimer.current=null; } };
  const startChatListen = async () => {
    if(chatListening){ if(chatRecRef.current) try{chatRecRef.current.stop();}catch(e){} return; }
    setChatInput('');
    try{
      const ctrl = await Backend.startTranscribe({
        // Records, then OpenAI transcribes (auto-detects Hindi/English). The text
        // lands in the input box for review — it is not auto-sent.
        onStatus:(s)=>{
          if(s==='recording'){ setChatListening(true); setChatTranscribing(false); setRecSecs(0); stopRecTimer(); recTimer.current=setInterval(()=>setRecSecs(n=>n+1),1000); }
          else if(s==='transcribing'){ setChatListening(false); setChatTranscribing(true); stopRecTimer(); }
          else if(s==='silent'){ setChatListening(false); setChatTranscribing(false); stopRecTimer(); showToast('कुछ सुनाई नहीं दिया · Didn’t catch that'); }
        },
        onPartial:(t)=> setChatInput(t),
        onFinal:(t)=>{ setChatListening(false); setChatTranscribing(false); stopRecTimer(); chatRecRef.current=null; if(t && t.trim()) setChatInput(t); },
        onError:()=>{ setChatListening(false); setChatTranscribing(false); stopRecTimer(); },
      });
      chatRecRef.current = ctrl;
      if(ctrl.unavailable){ chatRecRef.current=null; setChatListening(false); setChatTranscribing(false); stopRecTimer(); }
    }catch(e){ setChatListening(false); setChatTranscribing(false); stopRecTimer(); }
  };

  // Persist conversations locally; auto-scroll the open chat as it streams.
  useEffect(()=>{ saveChats(uid, convs); }, [convs]);
  useEffect(()=>{ if(chatScrollRef.current) chatScrollRef.current.scrollTop = chatScrollRef.current.scrollHeight; }, [convs, activeConv, screen]);

  /* ---------- derived view model ---------- */
  let receivable=0,payable=0,monthlyIn=0,monthlyOut=0,assetsTotal=0;
  txns.forEach(t=>{
    const acc=interestDue(t), bal=outstanding(t);
    if(t.kind==='lent'){ receivable+=bal+acc; monthlyIn+=bal*monthlyFrac(t); }
    else if(t.kind==='borrowed'){ payable+=bal+acc; monthlyOut+=bal*monthlyFrac(t); }
    else assetsTotal+=t.amount;
  });
  const net=receivable-payable;
  const C=2*Math.PI*54, tot=receivable+payable||1;
  const gLen=C*(receivable/tot), rLen=C*(payable/tot);
  const netCompact=compact(net);

  const loanUpcoming = txns.filter(t=>t.kind!=='asset' && outstanding(t)>0).map(t=>{
    const mat=addMonths(pd(t.date),t.term);
    const dl=days(TODAY,mat);
    const due=outstanding(t)+interestFull(t)-accrued(t);
    const pay=t.kind==='borrowed';
    return { id:t.id, mat, party:t.party,
      sub:(pay?'You pay · ':'You receive · ')+compact(interestFull(t))+' interest',
      amount:compact(due), color:pay?'#E5544B':'#2A9D8F', tint:pay?'#FBEAE7':'#E4F2EF',
      day:mat.getDate(), mon:MON[mat.getMonth()],
      daysLeft: dl<0?Math.abs(dl)+'d ago':(dl===0?'today':'in '+dl+'d') };
  });
  // Asset instalments that have a "next payment due" date and still owe a balance.
  const assetUpcoming = txns.filter(t=>t.kind==='asset' && t.nextDue && (parseFloat(t.amount)||0)-assetPaid(t)>0).map(t=>{
    const mat=pd(t.nextDue); const dl=days(TODAY,mat); const rem=(parseFloat(t.amount)||0)-assetPaid(t);
    return { id:t.id, mat, party:t.party, sub:'Next installment · '+(ASSET_ICON[t.subtype]||'🏠')+' '+assetTypeLabel(t.subtype),
      amount:compact(rem), color:'#E9A23B', tint:'#FBF1DC', day:mat.getDate(), mon:MON[mat.getMonth()],
      daysLeft: dl<0?Math.abs(dl)+'d ago':(dl===0?'today':'in '+dl+'d') };
  });
  const upcoming = [...loanUpcoming, ...assetUpcoming].sort((a,b)=>a.mat-b.mat).slice(0,5);

  const order=['Ramesh Uncle','Mehta Finance','Priya Shah','Greenfield Plot','Suresh Patel','Deepak Rao','Anil Verma'];
  const extra=[...new Set(txns.map(t=>t.party))].filter(p=>!order.includes(p));
  const present=[...order,...extra].filter(p=>txns.some(t=>t.party===p));
  // Node data for the interactive Money Map (positions/physics live in <MoneyGraph>).
  const graphParties = present.map((p)=>{
    const pt=txns.filter(t=>t.party===p);
    const pn=personNet(txns,p);
    const sum=pt.reduce((s,t)=>s+(t.kind==='asset'?t.amount:outstanding(t)),0);
    // A party with loans but nothing outstanding (and no interest due) is fully
    // settled — keep them on the map as a standalone, faded node.
    const hasAsset=pt.some(t=>t.kind==='asset');
    const settled=!hasAsset && pt.every(t=>outstanding(t)<=0 && interestDue(t)<=0);
    return { name:p, initials:initials(p), color:pn.color,
      amount:settled?'settled':compact(sum), settled,
      // Money-flow direction: 'in' = they → You (you borrowed), 'out' = You → them (lent/asset).
      dir: pn.kind==='borrowed' ? 'in' : 'out',
      w: settled?1.6:Math.max(2,Math.min(7,sum/100000)) };
  });

  const grp=(kind)=>{
    const names=[...new Set(txns.filter(t=>t.kind===kind).map(t=>t.party))];
    return names.map(p=>{
      const pt=txns.filter(t=>t.party===p);
      const principal=pt.reduce((s,t)=>s+outstanding(t),0);
      const acc=pt.reduce((s,t)=>s+accrued(t),0);
      const col=KIND_COLOR[kind];
      const rates=[...new Set(pt.map(t=>t.rate))];
      const basis=pt.every(t=>t.rateBasis==='annual')?' p.a.':'/mo';
      return { name:p, initials:initials(p), color:col, tint:tintFor(col),
        sub:pt.length+(pt.length>1?' loans · ':' loan · ')+(pt[0].purpose||'—'),
        amount:compact(principal+acc), rate:rates.join('/')+'%'+basis };
    });
  };
  const assetList=txns.filter(t=>t.kind==='asset').map(t=>({
    name:t.party, initials:initials(t.party), sub:(t.purpose||'Asset')+' · '+fmtDate(pd(t.date)),
    amount:compact(t.amount) }));

  const KMAP={borrowed:'#E5544B',lent:'#2A9D8F',asset:'#E9A23B'};
  const KLBL={borrowed:'Borrowed from',lent:'Lent to',asset:'Bought'};
  let activity=[...txns].sort((a,b)=>pd(b.date)-pd(a.date));
  if(filter!=='all') activity=activity.filter(t=>t.kind===filter);
  activity=activity.map((t,i)=>({
    key:t.id||i, party:t.party, initials:initials(t.party), color:KMAP[t.kind], tint:tintFor(KMAP[t.kind]),
    title:KLBL[t.kind]+' '+t.party, date:fmtDate(pd(t.date)),
    method:t.method==='cash'?'Cash':'Bank',
    signed:(t.kind==='lent'?'+':t.kind==='borrowed'?'−':'')+compact(t.amount),
    rate:t.kind==='asset'?'asset':t.rate+'%' }));

  let detail=null;
  if(detailParty){
    const p=detailParty, pt=txns.filter(t=>t.party===p);
    if(pt.length){
      const pn=personNet(txns,p), kind=pn.kind, col=pn.color;
      const bal=pn.kind==='asset'
        ? pt.reduce((s,t)=>s+(t.kind==='asset'?(parseFloat(t.amount)||0):0),0)
        : Math.abs(
            pt.reduce((s,t)=>s+(t.kind==='lent'?outstanding(t):0),0) -
            pt.reduce((s,t)=>s+(t.kind==='borrowed'?outstanding(t):0),0));
      const acc=Math.abs(
        pt.reduce((s,t)=>s+(t.kind==='lent'?interestDue(t):0),0) -
        pt.reduce((s,t)=>s+(t.kind==='borrowed'?interestDue(t):0),0));
      const settled=pt.every(t=>t.kind==='asset'?false:(outstanding(t)<=0 && interestDue(t)<=0));
      const rel=kind==='borrowed'?'You borrowed from them':kind==='lent'?'You lent to them':'Asset you own';
      const netLabel=kind==='borrowed'?'You owe (outstanding + interest)':kind==='lent'?'They owe you (outstanding + interest)':'Asset value';
      const KLBL2={borrowed:'Borrowed',lent:'Lent',asset:'Asset'};
      const isAsset = kind==='asset';
      const aPrice = pt.reduce((s,t)=>s+(t.kind==='asset'?(parseFloat(t.amount)||0):0),0);
      const aPaid  = pt.reduce((s,t)=>s+(t.kind==='asset'?assetPaid(t):0),0);
      const aMkt   = pt.reduce((s,t)=>s+(t.kind==='asset'?(parseFloat(t.marketValue)||0):0),0);
      const aRent  = pt.reduce((s,t)=>s+(t.kind==='asset'?(parseFloat(t.rent)||0):0),0);
      detail={ name:p, initials:initials(p), color:col, tint:tintFor(col), relation:rel, netLabel, settled,
        net:inr(isAsset?aPrice:(bal+acc)), accrued:compact(acc), totalDue:compact(bal+acc),
        isAsset,
        asset: isAsset ? {
          price:inr(aPrice), paid:inr(aPaid), remaining:inr(Math.max(0,aPrice-aPaid)),
          pct: aPrice>0?Math.min(100,Math.round(aPaid/aPrice*100)):0, fullyPaid: aPrice>0 && aPaid>=aPrice,
          hasMkt:aMkt>0, mkt:inr(aMkt), gainUp:(aMkt-aPrice)>=0, gainStr:((aMkt-aPrice)>=0?'+':'−')+inr(Math.abs(aMkt-aPrice)),
          hasRent:aRent>0, rent:inr(aRent) } : null,
        txns: pt.map((t,i)=> t.kind==='asset' ? (()=>{ const price=parseFloat(t.amount)||0, paid=assetPaid(t), rem=Math.max(0,price-paid), ar=parseFloat(t.area)||0, per=ar>0?price/ar:0, mkt=parseFloat(t.marketValue)||0, rent=parseFloat(t.rent)||0; return {
          key:t.id||i, raw:t, isAsset:true, amount:inr(price),
          icon:ASSET_ICON[t.subtype]||'📦', typeLabel:assetTypeLabel(t.subtype),
          hasArea:ar>0, area: ar>0?(ar+' '+unitLabel(t.areaUnit)):'', perUnit: per>0?(inr(Math.round(per))+'/'+unitLabel(t.areaUnit)):'',
          hasLocation:!!t.location, location:t.location||'',
          price:inr(price), paid:inr(paid), remaining:inr(rem), pct: price>0?Math.min(100,Math.round(paid/price*100)):0, fullyPaid: price>0 && rem<=0,
          hasMkt:mkt>0, mkt:inr(mkt), gainUp:(mkt-price)>=0, gainStr:((mkt-price)>=0?'+':'−')+inr(Math.abs(mkt-price)),
          hasRent:rent>0, rent:inr(rent),
          hasNextDue: !!t.nextDue && rem>0, nextDue: t.nextDue?fmtDate(pd(t.nextDue)):'', nextDueDays: t.nextDue?Math.round((pd(t.nextDue)-TODAY)/86400000):0,
          start:fmtDate(pd(t.date)), method:t.method==='cash'?'Cash':'Bank transfer',
          pays:(t.payments||[]).map((r,j)=>({key:j, when:fmtDate(pd(r.date)), amount:inr(parseFloat(r.amount)||0), method:r.method==='bank'?'Bank':'Cash', note:r.note||''})),
          hasPurpose:!!t.purpose, purpose:t.purpose, hasNotes:!!t.notes, notes:t.notes }; })() : {
          key:t.id||i, raw:t, isAsset:false, amount:inr(t.amount), kind:KLBL2[t.kind], color:KMAP[t.kind], tint:tintFor(KMAP[t.kind]),
          rate:t.rate+'% '+(t.rateBasis==='annual'?'p.a.':'/mo')+(t.interestType==='compound'?' · compound':''), term:t.term+' months',
          start:fmtDate(pd(t.date)),
          matures:fmtDate(addMonths(pd(t.date),t.term)),
          method:t.method==='cash'?'Cash':'Bank transfer',
          outstanding:compact(outstanding(t)),
          fullyPaid: outstanding(t)<=0 && interestDue(t)<=0,
          repays:(t.repayments||[]).map((r,j)=>{ const pr=repPrincipal(r), it=repInterest(r); return {key:j, when:fmtDate(pd(r.date)), principal:pr?inr(pr):'', interest:it?inr(it):'', amount:inr(pr+it), method:r.method==='bank'?'Bank':'Cash', note:r.note||''}; }),
          hasPurpose:!!t.purpose, purpose:t.purpose, hasNotes:!!t.notes, notes:t.notes }) };
    }
  }

  const d=draft;
  let kindOpts=[],partyLabel='Person',draftInterest='₹0';
  if(d){
    kindOpts=[['borrowed','Borrowed'],['lent','Lent'],['asset','Asset']].map(([v,l])=>({value:v,label:l}));
    partyLabel=d.kind==='borrowed'?'From':d.kind==='lent'?'To':'Asset name';
    const amt=parseFloat(d.amount)||0, rt=parseFloat(d.rate)||0, tm=parseFloat(d.term)||0;
    const perMonth = d.rateBasis==='annual' ? rt/12 : rt;
    draftInterest = d.interestType==='compound'
      ? inr(amt*(Math.pow(1+perMonth/100, tm)-1))   // compound over the term
      : inr(amt*perMonth/100*tm);                    // simple
  }
  const navc=(s)=> screen===s?ACCENT:'#b9afa1';
  const displayName = (user && (user.name || (user.email||'').split('@')[0])) || 'there';
  const avatarInitials = initials(displayName).slice(0,2).toUpperCase() || '🙂';
  const greeting = () => { const h=new Date().getHours(); return h<12?'Good morning':h<17?'Good afternoon':'Good evening'; };
  const draftV = d || {amount:'',party:'',rate:'',rateBasis:'monthly',interestType:'simple',term:'',date:'',purpose:'',notes:'',kind:'borrowed',method:'cash'};
  const cloudOn = !!(Backend && (Backend.cloudConfigured || Backend.apiConfigured));

  /* ---------- render ---------- */
  return (
    <div className="frameWrap" style={css(frameOuter)}>
      <div className="phone" style={css(frameInner)}>

        {/* ===== HOME ===== */}
        {screen==='home' && (
          <div className="scr" style={css("position:absolute;inset:0;overflow-y:auto;padding:62px 20px 110px;")}>
            <div style={css("display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;")}>
              <div>
                <div style={css("font-size:14px;color:#8C8278;font-weight:600;")}>{greeting()},{syncing?' syncing…':''}</div>
                <div style={css("font-size:23px;font-weight:800;color:#2A2420;letter-spacing:-.3px;")}>{displayName}</div>
              </div>
              <div onClick={()=>setScreen('settings')} title="Settings" style={css("width:46px;height:46px;border-radius:50%;background:linear-gradient(140deg,#F2B07A,#E5544B);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:17px;box-shadow:0 6px 14px -4px rgba(229,84,75,.5);cursor:pointer;")}>{avatarInitials}</div>
            </div>

            {heroStyle==='ring' ? (
              <div style={css("background:#2A2420;border-radius:28px;padding:24px 22px;color:#fff;box-shadow:0 18px 36px -16px rgba(42,36,32,.6);margin-bottom:14px;")}>
                <div style={css("display:flex;align-items:center;gap:20px;")}>
                  <div style={css("position:relative;width:128px;height:128px;flex:none;")}>
                    <svg width="128" height="128" viewBox="0 0 128 128" style={css("transform:rotate(-90deg);")}>
                      <circle cx="64" cy="64" r="54" fill="none" stroke="#3a342d" strokeWidth="15"></circle>
                      <circle cx="64" cy="64" r="54" fill="none" stroke="#2A9D8F" strokeWidth="15" strokeLinecap="round" strokeDasharray={`${gLen} ${C}`}></circle>
                      <circle cx="64" cy="64" r="54" fill="none" stroke="#E5544B" strokeWidth="15" strokeLinecap="round" strokeDasharray={`${rLen} ${C}`} strokeDashoffset={`${-gLen}`}></circle>
                    </svg>
                    <div style={css("position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;")}>
                      <span style={css("font-size:10px;color:#a9a298;font-weight:700;text-transform:uppercase;letter-spacing:.5px;")}>Net</span>
                      <span style={css("font-size:20px;font-weight:800;letter-spacing:-.5px;")}>{netCompact}</span>
                    </div>
                  </div>
                  <div style={css("flex:1;display:flex;flex-direction:column;gap:14px;")}>
                    <div>
                      <div style={css("display:flex;align-items:center;gap:7px;")}><span style={css("width:9px;height:9px;border-radius:50%;background:#2A9D8F;")}></span><span style={css("font-size:12px;color:#a9a298;font-weight:700;")}>Owed to you</span></div>
                      <div style={css("font-size:18px;font-weight:800;letter-spacing:-.3px;margin-top:2px;")}>{inr(receivable)}</div>
                    </div>
                    <div>
                      <div style={css("display:flex;align-items:center;gap:7px;")}><span style={css("width:9px;height:9px;border-radius:50%;background:#E5544B;")}></span><span style={css("font-size:12px;color:#a9a298;font-weight:700;")}>You owe</span></div>
                      <div style={css("font-size:18px;font-weight:800;letter-spacing:-.3px;margin-top:2px;")}>{inr(payable)}</div>
                    </div>
                  </div>
                </div>
              </div>
            ) : (
              <div style={css("background:#2A2420;border-radius:28px;padding:22px;color:#fff;box-shadow:0 18px 36px -16px rgba(42,36,32,.6);margin-bottom:14px;")}>
                <div style={css("display:flex;align-items:baseline;justify-content:space-between;margin-bottom:18px;")}>
                  <span style={css("font-size:12px;color:#a9a298;font-weight:700;text-transform:uppercase;letter-spacing:.6px;")}>Net position</span>
                  <span style={css("font-size:28px;font-weight:900;letter-spacing:-.6px;")}>{netCompact}</span>
                </div>
                <div style={css("margin-bottom:14px;")}>
                  <div style={css("display:flex;justify-content:space-between;margin-bottom:6px;")}><span style={css("font-size:12px;color:#cfc8bd;font-weight:700;")}>Owed to you</span><span style={css("font-size:13px;font-weight:800;")}>{inr(receivable)}</span></div>
                  <div style={css("height:12px;background:#3a342d;border-radius:8px;overflow:hidden;")}><div style={css(`height:100%;background:#2A9D8F;border-radius:8px;width:${Math.round(receivable/tot*100)}%;`)}></div></div>
                </div>
                <div>
                  <div style={css("display:flex;justify-content:space-between;margin-bottom:6px;")}><span style={css("font-size:12px;color:#cfc8bd;font-weight:700;")}>You owe</span><span style={css("font-size:13px;font-weight:800;")}>{inr(payable)}</span></div>
                  <div style={css("height:12px;background:#3a342d;border-radius:8px;overflow:hidden;")}><div style={css(`height:100%;background:#E5544B;border-radius:8px;width:${Math.round(payable/tot*100)}%;`)}></div></div>
                </div>
              </div>
            )}

            <div style={css("display:flex;gap:10px;margin-bottom:24px;")}>
              <div style={css("flex:1;background:#fff;border-radius:18px;padding:14px;border:1px solid #efe7db;")}>
                <div style={css("font-size:11px;color:#8C8278;font-weight:700;margin-bottom:4px;")}>Interest in / mo</div>
                <div style={css("font-size:17px;font-weight:800;color:#2A9D8F;")}>{compact(monthlyIn)}</div>
              </div>
              <div style={css("flex:1;background:#fff;border-radius:18px;padding:14px;border:1px solid #efe7db;")}>
                <div style={css("font-size:11px;color:#8C8278;font-weight:700;margin-bottom:4px;")}>Interest out / mo</div>
                <div style={css("font-size:17px;font-weight:800;color:#E5544B;")}>{compact(monthlyOut)}</div>
              </div>
              <div style={css("flex:1;background:#fff;border-radius:18px;padding:14px;border:1px solid #efe7db;")}>
                <div style={css("font-size:11px;color:#8C8278;font-weight:700;margin-bottom:4px;")}>Assets</div>
                <div style={css("font-size:17px;font-weight:800;color:#E9A23B;")}>{compact(assetsTotal)}</div>
              </div>
            </div>

            <div style={css("display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;")}>
              <span style={css("font-size:17px;font-weight:800;color:#2A2420;")}>Upcoming</span>
              <span style={css("font-size:13px;font-weight:700;color:#8C8278;")}>{txns.filter(t=>t.kind!=='asset').length} due</span>
            </div>
            <div style={css("display:flex;flex-direction:column;gap:10px;")}>
              {upcoming.map(u=>(
                <div key={u.id} onClick={()=>openParty(u.party)} style={css("background:#fff;border-radius:18px;padding:14px;border:1px solid #efe7db;display:flex;align-items:center;gap:13px;cursor:pointer;")}>
                  <div style={css(`width:44px;height:44px;border-radius:14px;flex:none;display:flex;flex-direction:column;align-items:center;justify-content:center;background:${u.tint};`)}>
                    <span style={css(`font-size:16px;font-weight:900;color:${u.color};line-height:1;`)}>{u.day}</span>
                    <span style={css(`font-size:9px;font-weight:800;color:${u.color};text-transform:uppercase;`)}>{u.mon}</span>
                  </div>
                  <div style={css("flex:1;min-width:0;")}>
                    <div style={css("font-size:15px;font-weight:800;color:#2A2420;")}>{u.party}</div>
                    <div style={css("font-size:12px;font-weight:600;color:#8C8278;")}>{u.sub}</div>
                  </div>
                  <div style={css("text-align:right;")}>
                    <div style={css(`font-size:15px;font-weight:800;color:${u.color};`)}>{u.amount}</div>
                    <div style={css("font-size:11px;font-weight:700;color:#a89f93;")}>{u.daysLeft}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* ===== GRAPH ===== */}
        {screen==='graph' && (
          <div className="scr" style={css("position:absolute;inset:0;overflow-y:auto;padding:62px 20px 110px;")}>
            <div style={css("margin-bottom:6px;font-size:23px;font-weight:800;color:#2A2420;letter-spacing:-.3px;")}>Money Map</div>
            <div style={css("font-size:13px;font-weight:600;color:#8C8278;margin-bottom:8px;")}>Drag to rearrange · arrows show which way money flows · tap a node to open</div>

                  <span style={css("width:24px;height:24px;border-radius:8px;background:linear-gradient(140deg,#F2B07A,#E5544B);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:900;")}>＋</span>
                  New chat — कुछ भी पूछें
                </button>
                {convs.length===0 ? (
                  <div style={css("margin-top:18px;text-align:center;")}>
                    <div style={css("font-size:14px;font-weight:800;color:#2A2420;margin-bottom:6px;")}>नमस्ते! मैं Munshi हूँ।</div>
                    <div style={css("font-size:12px;font-weight:600;color:#8C8278;margin-bottom:16px;line-height:1.5;")}>ब्याज पूछें, नया लेन-देन जोड़ें, या किसी का हिसाब बनवाकर WhatsApp पर भेजें।</div>
                    <div style={css("display:flex;flex-direction:column;gap:8px;")}>
                      {['इस महीने मुझे कुल कितना ब्याज मिलेगा?','Suresh ka hisab bana ke do (bhejne ke liye)','Ramesh ko 5 lakh diye 2 rupaye saikda 6 mahine','अगर सब डेढ़ की जगह दो रुपए होता तो कितना फ़र्क?'].map((s,i)=>(
                        <button key={i} onClick={()=>sendChat(s)} style={css("text-align:left;border:1px solid #e3d9c9;background:#fff;color:#2A2420;border-radius:14px;padding:11px 13px;font-size:13px;font-weight:700;cursor:pointer;")}>{s}</button>

                          </div>

                            <div style={css("font-size:13.5px;font-weight:800;color:#2A2420;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;")}>{c.title||'Chat'}</div>

            {/* ---- Open conversation ---- */}
            {active && (<>
            <div ref={chatScrollRef} className="scr" style={css("flex:1;overflow-y:auto;padding:16px 16px 150px;display:flex;flex-direction:column;gap:12px;")}>

                  <div style={css("font-size:15px;font-weight:800;color:#2A2420;margin-bottom:6px;")}>नमस्ते! बोलिए, क्या हिसाब देखें?</div>
                  <div style={css("font-size:12px;font-weight:600;color:#8C8278;margin-bottom:18px;line-height:1.5;max-width:280px;margin-left:auto;margin-right:auto;")}>ब्याज पूछें, किश्त जोड़ें, नया लेन-देन बोलें, या किसी का हिसाब बनवाकर भेजें — हिंदी या English में।</div>

                      <button key={i} onClick={()=>sendChat(s)} style={css("text-align:left;border:1px solid #e3d9c9;background:#fff;color:#2A2420;border-radius:14px;padding:11px 13px;font-size:13px;font-weight:700;cursor:pointer;")}>{s}</button>

                  </div>
                </div>

                ) : (
                  <div key={i} style={css("align-self:flex-start;max-width:88%;display:flex;flex-direction:column;gap:8px;")}>

                        💭 {m.content||m.statement ? 'सोचा' : ('सोच रहा हूँ… '+m.reasoning.replace(/\s+/g,' ').slice(-110))}
                      </div>

                      <div style={css("background:#fff;border:1px solid #efe7db;color:#2A2420;border-radius:18px 18px 18px 4px;padding:12px 14px;font-size:14px;font-weight:600;line-height:1.55;white-space:pre-wrap;")}>{m.content ? renderRich(m.content) : (chatBusy && i===chatMsgs.length-1 ? '…' : '')}</div>

                          <button onClick={()=>copyText(m.statement)} style={css("flex:1;border:1px solid #e3d9c9;background:#fff;color:#2A2420;border-radius:11px;padding:10px 0;font-size:13px;font-weight:800;cursor:pointer;")}>{copied?'✓ Copied':'Copy'}</button>
                        </div>
                      </div>
                    )}
                    {m.action && (()=>{ const A=m.action;
                      const addList = A.type==='add' ? (Array.isArray(A.txns)?A.txns:(A.txn?[A.txn]:[])) : [];
                      const lbl = (a)=> a.kind==='asset'
                        ? `${ASSET_ICON[a.subtype]||'📦'} ${assetTypeLabel(a.subtype)} ${inr(parseFloat(a.amount)||0)} · ${a.party||'—'}${a.area?` · ${a.area} ${unitLabel(a.areaUnit)}`:''}${a.location?` · ${a.location}`:''}${Array.isArray(a.payments)&&a.payments.length?` · paid ${inr(a.payments.reduce((s,p)=>s+(parseFloat(p.amount)||0),0))}`:''}`
                        : `${a.kind==='lent'?'Lend':'Borrow'} ${inr(parseFloat(a.amount)||0)} · ${a.party||'—'}${a.rate?` · ${a.rate}% ${a.rateBasis==='annual'?'p.a.':'/mo'}${a.interestType==='compound'?' compound':''}`:''}${a.term?` · ${a.term} mo`:''} · ${a.method==='bank'?'Bank':'Cash'}`;
                      const editTgt = A.type==='edit' ? findEditTarget(A) : null;
                      const editRes = editTgt ? applyEditChanges(editTgt, A.changes||{}) : null;

                      <div style={css("background:#f1f7f5;border:1px solid #dcebe6;border-radius:14px;padding:11px 13px;")}>

                          A.type==='installment' ? (()=>{ const amt=parseFloat(A.amount)||0, pct=parseFloat(A.percent)||0; return <div>{`🏠 Installment · ${A.party}: ${amt?inr(amt):(pct?pct+'% of total':'—')}${A.method?` · ${A.method==='bank'?'Bank':'Cash'}`:''}`}</div>; })() :
                          A.type==='edit' ? (editRes ? (<>
                            <div>{lbl(editRes)}</div>
                            {changed.length>0 && <div style={css("font-size:11px;font-weight:700;color:#2A9D8F;")}>changed: {changed.join(', ')}</div>}
                          </>) : <div>{`Edit ${A.party} → ${Object.entries(A.changes||{}).map(([k,v])=>k+': '+(k==='amount'?inr(parseFloat(v)||0):v)).join(', ')}`}</div>) : <div>Action</div>

                        {!m.applied && (
                          <div style={css("display:flex;gap:8px;")}>
                            <button onClick={()=>applyAction(i, A)} style={css("flex:1;border:none;background:#2A9D8F;color:#fff;border-radius:11px;padding:9px 0;font-size:13px;font-weight:800;cursor:pointer;")}>Confirm &amp; save</button>

                            <button onClick={()=>setChatMsgs(prev=>{const c=[...prev];c[i]={...c[i],action:null};return c;})} style={css("flex:none;border:1px solid #e3d9c9;background:#fff;color:#8C8278;border-radius:11px;padding:9px 12px;font-size:13px;font-weight:800;cursor:pointer;")}>✕</button>
                          </div>
                        )}
                      </div>

                  </div>
                )
              ))}

            {(chatListening || chatTranscribing) && (
              <div onClick={()=>{ if(chatListening) startChatListen(); }} style={css(`position:absolute;left:14px;right:14px;bottom:140px;z-index:36;background:${chatListening?'#E5544B':'#E9A23B'};color:#fff;border-radius:16px;padding:11px 16px;display:flex;align-items:center;gap:11px;box-shadow:0 12px 28px -10px rgba(0,0,0,.4);animation:floatUp .25s ease;cursor:${chatListening?'pointer':'default'};`)}>
                {chatListening ? (<>
                  <span style={css("position:relative;width:11px;height:11px;flex:none;display:flex;align-items:center;justify-content:center;")}>
                    <span style={css("position:absolute;inset:0;border-radius:50%;background:#fff;animation:pulseRing 1.5s ease-out infinite;")}></span>
                    <span style={css("width:11px;height:11px;border-radius:50%;background:#fff;")}></span>
                  </span>
                  <span style={css("display:flex;align-items:flex-end;gap:3px;height:22px;")}>
                    <span style={css("width:3px;background:#fff;border-radius:2px;animation:mb1 .9s ease-in-out infinite;")}></span>
                    <span style={css("width:3px;background:#fff;border-radius:2px;animation:mb2 .9s ease-in-out infinite;")}></span>
                    <span style={css("width:3px;background:#fff;border-radius:2px;animation:mb3 .9s ease-in-out infinite;")}></span>
                    <span style={css("width:3px;background:#fff;border-radius:2px;animation:mb4 .9s ease-in-out infinite;")}></span>
                  </span>
                  <span style={css("flex:1;font-size:13.5px;font-weight:800;")}>सुन रहा हूँ… Recording</span>

                  <span style={css("font-size:12px;font-weight:800;background:rgba(255,255,255,.22);border-radius:9px;padding:5px 9px;")}>Tap to stop</span>
                </>) : (<>
                  <span style={css("display:flex;align-items:flex-end;gap:3px;height:18px;")}>
                    <span style={css("width:3px;background:#fff;border-radius:2px;animation:mb2 .7s ease-in-out infinite;")}></span>
                    <span style={css("width:3px;background:#fff;border-radius:2px;animation:mb3 .7s ease-in-out infinite;")}></span>
                    <span style={css("width:3px;background:#fff;border-radius:2px;animation:mb1 .7s ease-in-out infinite;")}></span>
                  </span>
                  <span style={css("flex:1;font-size:13.5px;font-weight:800;")}>Transcribing… लिख रहा हूँ</span>
                </>)}
              </div>
            )}
            <div style={css("position:absolute;left:0;right:0;bottom:88px;background:#FBF6EF;border-top:1px solid #efe7db;padding:10px 14px;display:flex;align-items:center;gap:8px;z-index:34;")}>
              <button onClick={startChatListen} title="Speak — Hindi or English (auto-detect)" style={css(`flex:none;width:42px;height:42px;border-radius:13px;border:none;background:${chatListening?'#E5544B':chatTranscribing?'#E9A23B':'#f3ede3'};display:flex;align-items:center;justify-content:center;cursor:pointer;`)}>
                <svg width="20" height="20" viewBox="0 0 24 24" fill={chatListening||chatTranscribing?'#fff':'#8C8278'}><rect x="9" y="3" width="6" height="11" rx="3"></rect><path d="M6 11a6 6 0 0 0 12 0" fill="none" stroke={chatListening||chatTranscribing?'#fff':'#8C8278'} strokeWidth="2" strokeLinecap="round"></path><path d="M12 17v3" fill="none" stroke={chatListening||chatTranscribing?'#fff':'#8C8278'} strokeWidth="2" strokeLinecap="round"></path></svg>
              </button>
              <input value={chatInput} onChange={e=>setChatInput(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')sendChat(chatInput);}} placeholder={chatListening?'सुन रहा हूँ… (फिर से दबाकर रोकें)':chatTranscribing?'Transcribing…':'Ask anything — Hindi, English or Hinglish'} style={css("flex:1;border:1px solid #e3d9c9;background:#fff;border-radius:14px;padding:12px 14px;font-size:14px;font-weight:600;color:#2A2420;outline:none;")} />
              <button onClick={()=>sendChat(chatInput)} disabled={chatBusy} style={css(`flex:none;width:42px;height:42px;border-radius:13px;border:none;background:${chatBusy?'#cbb9a9':ACCENT};display:flex;align-items:center;justify-content:center;cursor:pointer;`)}>

              </button>
            </div>
            </>)}
          </div>

        {screen==='settings' && (
          <div className="scr" style={css("position:absolute;inset:0;overflow-y:auto;padding:62px 20px 120px;animation:fadeIn .2s ease;")}>
            <div style={css("display:flex;align-items:center;gap:12px;margin-bottom:22px;")}>
              <button onClick={()=>setScreen('home')} style={css("background:#fff;border:1px solid #efe7db;width:40px;height:40px;border-radius:50%;font-size:18px;font-weight:800;color:#2A2420;cursor:pointer;")}>‹</button>
              <div style={css("font-size:23px;font-weight:800;color:#2A2420;letter-spacing:-.3px;")}>Settings</div>
            </div>

            {/* Profile card */}
            <div style={css("background:#2A2420;border-radius:24px;padding:20px;color:#fff;display:flex;align-items:center;gap:14px;margin-bottom:18px;box-shadow:0 16px 32px -16px rgba(42,36,32,.6);")}>
              <div style={css("width:58px;height:58px;border-radius:50%;flex:none;background:linear-gradient(140deg,#F2B07A,#E5544B);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;")}>{avatarInitials}</div>

                <div style={css("font-size:18px;font-weight:800;letter-spacing:-.3px;")}>{displayName}</div>

            <div style={css("background:#fff;border:1px solid #efe7db;border-radius:18px;overflow:hidden;margin-bottom:18px;")}>

                </div>
                <div style={css("display:flex;gap:6px;background:#f3ede3;border-radius:11px;padding:3px;")}>

                  <button onClick={()=>setHeroStyle('bars')} style={css(seg2Style(heroStyle==='bars'))}>Bars</button>

                <div>
                  <div style={css("font-size:14px;font-weight:800;color:#2A2420;")}>Cloud sync</div>
                  <div style={css("font-size:12px;font-weight:600;color:#8C8278;")}>{cloudOn?'Your data is synced to the cloud':'Offline — local only'}</div>

              </div>
            </div>

            {/* Account */}
