/* ============================ AUTH ============================ */
// Interactive, draggable "Money Map" — a small force-directed graph (Obsidian-style).
// Nodes repel each other and are held to the central "You" node by a spring, so the
// layout self-arranges and gently wiggles; drag a node and the rest react, then it
// settles. Arrowheads point the way the money actually flows.
function MoneyGraph({ parties, netCompact, onOpen }){
  const CX=175, CY=190, L=124, REP=5200, REPC=1300, SPR=0.02, DAMP=0.88, VMAX=18, NR=34, CR=44;
  const boxRef=useRef(null), nodeMap=useRef({}), dragRef=useRef(null), rafRef=useRef(null);
  const onOpenRef=useRef(onOpen); onOpenRef.current=onOpen;
  const [,setTick]=useState(0);
  const clampX=(x)=>Math.max(28,Math.min(322,x));
  const clampY=(y)=>Math.max(34,Math.min(342,y));

  const step=()=>{
    const arr=Object.values(nodeMap.current);
    arr.forEach(a=>{ a.ax=0; a.ay=0; });
    for(let i=0;i<arr.length;i++){ for(let j=i+1;j<arr.length;j++){
      const a=arr[i], b=arr[j]; let dx=a.x-b.x, dy=a.y-b.y, d2=dx*dx+dy*dy; if(d2<1)d2=1;
      const d=Math.sqrt(d2), f=REP/d2, fx=f*dx/d, fy=f*dy/d;
      a.ax+=fx; a.ay+=fy; b.ax-=fx; b.ay-=fy;
    }}
    arr.forEach(a=>{
      let dx=a.x-CX, dy=a.y-CY, d=Math.hypot(dx,dy)||0.01, ux=dx/d, uy=dy/d;
      a.ax += (REPC/(d*d))*ux;            // gentle push off the centre
      const s=SPR*(d-L); a.ax -= s*ux; a.ay -= s*uy;   // spring to rest radius
      a.ay += (REPC/(d*d))*uy;
    });
    let ke=0;
    arr.forEach(a=>{ if(a.fixed){ a.vx=0; a.vy=0; return; }
      a.vx=(a.vx+a.ax)*DAMP; a.vy=(a.vy+a.ay)*DAMP;
      a.vx=Math.max(-VMAX,Math.min(VMAX,a.vx)); a.vy=Math.max(-VMAX,Math.min(VMAX,a.vy));
      a.x=clampX(a.x+a.vx); a.y=clampY(a.y+a.vy); ke+=a.vx*a.vx+a.vy*a.vy;
    });
    return ke;
  };
  const frame=()=>{ const ke=step(); setTick(t=>(t+1)&0xffff); rafRef.current = (ke>0.05 || dragRef.current) ? requestAnimationFrame(frame) : null; };
  const ensure=()=>{ if(rafRef.current==null) rafRef.current=requestAnimationFrame(frame); };

  const namesKey=parties.map(p=>p.name).join('|');
  useEffect(()=>{
    const map=nodeMap.current, names=parties.map(p=>p.name), n=parties.length||1;
    parties.forEach((p,i)=>{ if(!map[p.name]){ const ang=(-90+i*(360/n))*Math.PI/180; map[p.name]={ x:CX+L*Math.cos(ang), y:CY+L*Math.sin(ang), vx:0, vy:0, ax:0, ay:0, fixed:false }; } });
    Object.keys(map).forEach(k=>{ if(names.indexOf(k)<0) delete map[k]; });
    ensure();
  }, [namesKey]);

  useEffect(()=>{
    const move=(e)=>{ const d=dragRef.current; if(!d) return; const node=nodeMap.current[d.name]; if(!node||!boxRef.current) return;
      const r=boxRef.current.getBoundingClientRect();
      if(Math.hypot(e.clientX-d.sx, e.clientY-d.sy)>4) d.moved=true;
      node.x=clampX((e.clientX-r.left)-d.ox); node.y=clampY((e.clientY-r.top)-d.oy); node.vx=0; node.vy=0; ensure();
    };
    const up=()=>{ const d=dragRef.current; if(!d) return; dragRef.current=null; const node=nodeMap.current[d.name]; if(node) node.fixed=false; if(!d.moved) onOpenRef.current(d.name); ensure(); };
    window.addEventListener('pointermove', move); window.addEventListener('pointerup', up); window.addEventListener('pointercancel', up);
    return ()=>{ window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); window.removeEventListener('pointercancel', up); if(rafRef.current!=null){ cancelAnimationFrame(rafRef.current); rafRef.current=null; } };
  }, []);

  const down=(name)=>(e)=>{ e.preventDefault(); const node=nodeMap.current[name]; if(!node||!boxRef.current) return; const r=boxRef.current.getBoundingClientRect();
    dragRef.current={ name, sx:e.clientX, sy:e.clientY, ox:(e.clientX-r.left)-node.x, oy:(e.clientY-r.top)-node.y, moved:false }; node.fixed=true; ensure(); };

  const MK={ '#E5544B':'mgR', '#2A9D8F':'mgG', '#E9A23B':'mgA', '#d8cfc1':'mgX' };
  const edges=parties.map(p=>{ const node=nodeMap.current[p.name]; if(!node) return null;
    let dx=node.x-CX, dy=node.y-CY, d=Math.hypot(dx,dy)||0.01, ux=dx/d, uy=dy/d;
    const col=p.settled?'#d8cfc1':p.color, inward=p.dir==='in';
    // Leave a bigger gap before the arrow tip (headGap) so the chunky arrowhead
    // sits clearly in open space, just off the destination node.
    const headGap=inward?CR+9:NR+9;
    const cE={x:CX+ux*CR, y:CY+uy*CR}, nE={x:node.x-ux*NR, y:node.y-uy*NR};
    const tip = inward ? {x:CX+ux*headGap, y:CY+uy*headGap} : {x:node.x-ux*headGap, y:node.y-uy*headGap};
    const tail = inward ? nE : cE;          // line runs from source toward the tip
    // Cap line weight so a large balance can't get so thick it swallows the arrowhead.
    return { key:p.name, x1:tail.x, y1:tail.y, x2:tip.x, y2:tip.y, col, w:p.settled?2:Math.max(2.5,Math.min(4.5,p.w)), mk:MK[col]||'mgG' };
  }).filter(Boolean);

  return (
    <div ref={boxRef} style={css("position:relative;width:350px;height:380px;margin:0 auto;touch-action:none;")}>
      <svg width="350" height="380" style={css("position:absolute;inset:0;overflow:visible;")}>
        <defs>
          {[['mgR','#E5544B'],['mgG','#2A9D8F'],['mgA','#E9A23B'],['mgX','#d8cfc1']].map(([id,c])=>(
            <marker key={id} id={id} markerWidth="17" markerHeight="16" refX="13" refY="8" orient="auto" markerUnits="userSpaceOnUse"><path d="M1 1 L15 8 L1 15 L5 8 Z" fill={c}></path></marker>
          ))}
        </defs>
        {edges.map(e=>(
          <line key={e.key} x1={e.x1} y1={e.y1} x2={e.x2} y2={e.y2} stroke={e.col} strokeWidth={e.w} strokeLinecap="round" opacity="0.55" markerEnd={`url(#${e.mk})`}></line>
        ))}
      </svg>
      <div style={css("position:absolute;left:175px;top:190px;transform:translate(-50%,-50%);width:78px;height:78px;border-radius:50%;background:#2A2420;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;box-shadow:0 10px 24px -8px rgba(42,36,32,.6);z-index:5;pointer-events:none;")}>
        <span style={css("font-size:18px;font-weight:900;")}>You</span>
        <span style={css("font-size:9px;font-weight:700;color:#a9a298;")}>{netCompact}</span>
      </div>
      {parties.map((n)=>{ const node=nodeMap.current[n.name]; if(!node) return null; return (
        <div key={n.name} onPointerDown={down(n.name)} style={css(`position:absolute;left:${node.x}px;top:${node.y}px;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;cursor:grab;z-index:6;opacity:${n.settled?0.62:1};touch-action:none;user-select:none;`)}>
          <div style={css(`width:54px;height:54px;border-radius:50%;background:#fff;border:${n.settled?'2px dashed #c7bcab':'3px solid '+n.color};display:flex;align-items:center;justify-content:center;color:${n.settled?'#a89f93':n.color};font-weight:800;font-size:15px;box-shadow:0 6px 14px -6px rgba(60,40,20,.4);`)}>{n.initials}</div>
          <div style={css("font-size:11px;font-weight:800;color:#2A2420;margin-top:5px;text-align:center;max-width:78px;line-height:1.15;white-space:nowrap;pointer-events:none;")}>{n.name}</div>
          <div style={css(`font-size:10px;font-weight:800;color:${n.settled?'#a89f93':n.color};margin-top:2px;pointer-events:none;`)}>{n.settled?'✓ settled':n.amount}</div>
        </div>
      ); })}
    </div>
  );
}
// On a real phone (Capacitor native, or any narrow viewport) the app fills the
// whole screen. On a wide desktop browser we still show the pretty phone mockup
// (bezel + centred frame) so the web preview looks like a device.
const IS_PHONE = (()=>{ try{
  if(window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform()) return true;
  return window.matchMedia && window.matchMedia('(max-width: 640px)').matches;
}catch(e){ return false; } })();
const frameOuter = IS_PHONE
  ? "width:100%;min-height:100vh;background:#FBF6EF;font-family:'Nunito',sans-serif;"
  : "min-height:100vh;width:100%;background:radial-gradient(120% 120% at 50% 0%,#efe7db 0%,#e4dccf 100%);display:flex;align-items:center;justify-content:center;padding:40px 20px;font-family:'Nunito',sans-serif;";
const frameInner = IS_PHONE
  ? "position:relative;width:100%;height:100vh;height:100dvh;background:#FBF6EF;overflow:hidden;"
  : "position:relative;width:390px;height:844px;background:#FBF6EF;border-radius:46px;box-shadow:0 2px 1px rgba(0,0,0,.04),0 30px 60px -20px rgba(60,40,20,.35),0 0 0 11px #1f1b16,0 0 0 12px #3a3229;overflow:hidden;";
const Shell = ({children}) => (
  <div style={css(frameOuter)}>
    <div style={css(frameInner)}>{children}</div>
  </div>
);
const authInput = "width:100%;border:1.5px solid #e3d9c9;background:#fff;border-radius:14px;padding:14px 15px;font-size:15px;font-weight:600;color:#2A2420;outline:none;margin-bottom:11px;box-sizing:border-box;";
const friendlyAuthErr = (e) => {
  const m = (e && e.message) || String(e||'');
  if(/UserNotConfirmed/i.test(m)) return 'Please verify your email first — enter the code we sent.';
  if(/NotAuthorized|Incorrect username or password/i.test(m)) return 'Wrong email or password.';
  if(/UserNotFound/i.test(m)) return 'No account with this email.';
  if(/UsernameExists/i.test(m)) return 'An account with this email already exists — sign in.';
  if(/CodeMismatch/i.test(m)) return 'That code is incorrect.';
  if(/ExpiredCode/i.test(m)) return 'That code expired — request a new one.';
  if(/InvalidParameter|InvalidPassword/i.test(m)) return 'Password must be at least 6 characters.';
  return m.replace(/^.*Exception:?\s*/,'') || 'Something went wrong.';
};

function AuthScreens({ onAuthed }){
  const [mode, setMode] = useState('login');   // login | signup | confirm | forgot | reset
  const [name, setName] = useState('');
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [code, setCode] = useState('');
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState('');
  const [info, setInfo] = useState('');
  const go = (m)=>{ setErr(''); setInfo(''); setMode(m); };

  const doSignup = async ()=>{
    setErr('');
    if(!name.trim()) return setErr('Please enter your name.');
    if(!email.trim()) return setErr('Please enter your email.');
    if((password||'').length<6) return setErr('Password must be at least 6 characters.');
    setBusy(true);
    try{ await Backend.signUp({ email:email.trim(), password, name:name.trim() }); setInfo('We emailed you a 6-digit code.'); setMode('confirm'); }
    catch(e){ setErr(friendlyAuthErr(e)); }
    finally{ setBusy(false); }
  };
  const doConfirm = async ()=>{
    setErr(''); setBusy(true);
    try{ await Backend.confirmSignUp({ email:email.trim(), code:code.trim() });
      // auto-login after verifying
      const u = await Backend.signIn({ email:email.trim(), password });
      onAuthed(u);
    }catch(e){ setErr(friendlyAuthErr(e)); }
    finally{ setBusy(false); }
  };
  const doLogin = async ()=>{
    setErr(''); setBusy(true);
    try{ const u = await Backend.signIn({ email:email.trim(), password }); onAuthed(u); }
    catch(e){ if(/UserNotConfirmed/i.test(e&&e.message||'')){ try{ await Backend.resendCode({email:email.trim()}); }catch(_){} setInfo('Please verify your email — we sent a new code.'); setMode('confirm'); } else setErr(friendlyAuthErr(e)); }
    finally{ setBusy(false); }
  };
  // One-tap public demo — signs into a shared, pre-populated sandbox account so
  // portfolio visitors can explore without signing up. Credentials are public by design.
  const doDemo = async ()=>{
    setErr(''); setInfo(''); setBusy(true);
    try{ const u = await Backend.signIn({ email:'demo@cashflow.app', password:'cashflowdemo' }); onAuthed(u); }
    catch(e){ setErr('Demo is warming up — please try again in a moment.'); }
    finally{ setBusy(false); }
  };
  const doForgot = async ()=>{
    setErr(''); if(!email.trim()) return setErr('Enter your email first.');
    setBusy(true);
    try{ await Backend.forgotPassword({ email:email.trim() }); setInfo('We emailed you a reset code.'); setMode('reset'); }
    catch(e){ setErr(friendlyAuthErr(e)); }
    finally{ setBusy(false); }
  };
  const doReset = async ()=>{
    setErr(''); if((password||'').length<6) return setErr('Password must be at least 6 characters.');
    setBusy(true);
    try{ await Backend.confirmForgotPassword({ email:email.trim(), code:code.trim(), password }); setInfo('Password changed — sign in now.'); setMode('login'); setCode(''); }
    catch(e){ setErr(friendlyAuthErr(e)); }
    finally{ setBusy(false); }
  };
  const google = ()=>{ const url = Backend.googleSignInUrl && Backend.googleSignInUrl(); if(url) window.location.href = url; };

  const Title = ({t,s})=>(<div style={css("margin-bottom:20px;")}><div style={css("font-size:27px;font-weight:900;color:#2A2420;letter-spacing:-.6px;")}>{t}</div><div style={css("font-size:14px;font-weight:600;color:#8C8278;margin-top:3px;")}>{s}</div></div>);
  const Btn = ({onClick,children})=>(<button onClick={onClick} disabled={busy} style={css(`width:100%;border:none;background:${busy?'#cbb9a9':ACCENT};color:#fff;border-radius:14px;padding:15px;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 12px 24px -10px ${ACCENT_SHADOW};margin-top:4px;`)}>{busy?'Please wait…':children}</button>);
  const Msg = ()=>(<>{err&&<div style={css("background:#fdf0ee;border:1px solid #f3d6d2;color:#c0392b;border-radius:12px;padding:10px 12px;font-size:13px;font-weight:700;margin-bottom:11px;")}>{err}</div>}{info&&!err&&<div style={css("background:#f1f7f5;border:1px solid #dcebe6;color:#2A9D8F;border-radius:12px;padding:10px 12px;font-size:13px;font-weight:700;margin-bottom:11px;")}>{info}</div>}</>);
  const Link = ({onClick,children})=>(<span onClick={onClick} style={css("color:#F2784B;font-weight:800;cursor:pointer;")}>{children}</span>);

  return (
    <Shell>
      <div className="scr" style={css("position:absolute;inset:0;overflow-y:auto;padding:70px 26px 40px;display:flex;flex-direction:column;")}>
        <div style={css("display:flex;align-items:center;gap:11px;margin-bottom:30px;")}>
          <div style={css("width:46px;height:46px;border-radius:15px;background:linear-gradient(140deg,#F2B07A,#E5544B);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:22px;box-shadow:0 8px 18px -6px rgba(229,84,75,.5);")}>₹</div>
          <div style={css("font-size:21px;font-weight:900;color:#2A2420;letter-spacing:-.4px;")}>Cashflow</div>
        </div>

        {mode==='login' && (<>
          <Title t="Welcome back" s="Sign in to your hisab-kitab" />
          <Msg/>
          <input value={email} onChange={e=>setEmail(e.target.value)} type="email" placeholder="Email" autoCapitalize="none" style={css(authInput)} />
          <input value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')doLogin();}} type="password" placeholder="Password" style={css(authInput)} />
          <div style={css("text-align:right;margin:-4px 2px 12px;font-size:13px;")}><Link onClick={()=>go('forgot')}>Forgot password?</Link></div>
          <Btn onClick={doLogin}>Sign in</Btn>
          <div style={css("display:flex;align-items:center;gap:10px;margin:16px 0;")}><div style={css("flex:1;height:1px;background:#e3d9c9;")}></div><span style={css("font-size:12px;font-weight:700;color:#a89f93;")}>or</span><div style={css("flex:1;height:1px;background:#e3d9c9;")}></div></div>
          <button onClick={doDemo} disabled={busy} style={css("width:100%;border:1.5px solid #F2784B;background:#fff;color:#F2784B;border-radius:14px;padding:13px;font-size:14px;font-weight:800;cursor:pointer;")}>▶ Try the demo — no signup needed</button>
          {Backend.googleEnabled && (<>
            <div style={css("display:flex;align-items:center;gap:10px;margin:18px 0;")}><div style={css("flex:1;height:1px;background:#e3d9c9;")}></div><span style={css("font-size:12px;font-weight:700;color:#a89f93;")}>or</span><div style={css("flex:1;height:1px;background:#e3d9c9;")}></div></div>
            <button onClick={google} style={css("width:100%;border:1.5px solid #e3d9c9;background:#fff;color:#2A2420;border-radius:14px;padding:13px;font-size:14px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;")}>
              <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.4 29.3 35 24 35c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.5 5.1 29.5 3 24 3 12.4 3 3 12.4 3 24s9.4 21 21 21 21-9.4 21-21c0-1.2-.1-2.4-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16 19 13 24 13c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.5 5.1 29.5 3 24 3 16 3 9.1 7.6 6.3 14.7z"/><path fill="#4CAF50" d="M24 45c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.2 35.9 26.7 37 24 37c-5.3 0-9.7-2.5-11.3-6.9l-6.5 5C9.1 40.4 16 45 24 45z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.2-4.1 5.6l6.2 5.2C39.9 36.5 45 31 45 24c0-1.2-.1-2.4-.4-3.5z"/></svg>
              Continue with Google
            </button>
          </>)}
          <div style={css("text-align:center;margin-top:auto;padding-top:24px;font-size:14px;font-weight:600;color:#8C8278;")}>New here? <Link onClick={()=>go('signup')}>Create account</Link></div>
        </>)}

        {mode==='signup' && (<>
          <Title t="Create account" s="Just your name, email and a password" />
          <Msg/>
          <input value={name} onChange={e=>setName(e.target.value)} placeholder="Your name" style={css(authInput)} />
          <input value={email} onChange={e=>setEmail(e.target.value)} type="email" placeholder="Email" autoCapitalize="none" style={css(authInput)} />
          <input value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')doSignup();}} type="password" placeholder="Password (min 6 characters)" style={css(authInput)} />
          <Btn onClick={doSignup}>Create account</Btn>
          <div style={css("text-align:center;margin-top:auto;padding-top:24px;font-size:14px;font-weight:600;color:#8C8278;")}>Already have an account? <Link onClick={()=>go('login')}>Sign in</Link></div>
        </>)}

        {mode==='confirm' && (<>
          <Title t="Verify your email" s={`Enter the 6-digit code sent to ${email||'your email'}`} />
          <Msg/>
          <input value={code} onChange={e=>setCode(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')doConfirm();}} inputMode="numeric" placeholder="6-digit code" style={css(authInput)} />
          <Btn onClick={doConfirm}>Verify & continue</Btn>
          <div style={css("text-align:center;margin-top:16px;font-size:13px;font-weight:600;color:#8C8278;")}><Link onClick={async()=>{ try{ await Backend.resendCode({email:email.trim()}); setInfo('New code sent.'); setErr(''); }catch(e){ setErr(friendlyAuthErr(e)); } }}>Resend code</Link> · <Link onClick={()=>go('login')}>Back to sign in</Link></div>
        </>)}

        {mode==='forgot' && (<>
          <Title t="Reset password" s="We'll email you a reset code" />
          <Msg/>
          <input value={email} onChange={e=>setEmail(e.target.value)} type="email" placeholder="Email" autoCapitalize="none" style={css(authInput)} />
          <Btn onClick={doForgot}>Send reset code</Btn>
          <div style={css("text-align:center;margin-top:16px;font-size:13px;font-weight:600;color:#8C8278;")}><Link onClick={()=>go('login')}>Back to sign in</Link></div>
        </>)}

        {mode==='reset' && (<>
          <Title t="Choose a new password" s={`Enter the code sent to ${email||'your email'}`} />
          <Msg/>
          <input value={code} onChange={e=>setCode(e.target.value)} inputMode="numeric" placeholder="6-digit code" style={css(authInput)} />
          <input value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')doReset();}} type="password" placeholder="New password (min 6)" style={css(authInput)} />
          <Btn onClick={doReset}>Change password</Btn>
          <div style={css("text-align:center;margin-top:16px;font-size:13px;font-weight:600;color:#8C8278;")}><Link onClick={()=>go('login')}>Back to sign in</Link></div>
        </>)}
      </div>
    </Shell>
  );
}

function Root(){
  const [booting, setBooting] = useState(true);
  const [user, setUser] = useState(null);
  const authOn = !!(Backend && Backend.authConfigured);

  useEffect(()=>{ (async ()=>{
    try{
      // Handle the Google/Hosted-UI redirect (?code=...).
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');
      if(code && Backend.exchangeCode){
        try{ const u = await Backend.exchangeCode(code); setUser(u); }
        catch(e){ /* fall through to normal session check */ }
        // Clean the ?code= from the URL.
        window.history.replaceState({}, document.title, window.location.pathname);
      }
      if(!user && authOn && Backend.currentUser){
        const u = await Backend.currentUser();
        if(u) setUser(u);
      }
    } finally { setBooting(false); }
  })(); }, []);

  const signOut = async ()=>{ try{ await Backend.signOut(); }catch(e){} setUser(null); };

  if(booting){
    return <Shell><div style={css("position:absolute;inset:0;background:#FBF6EF;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;")}>
      <div style={css("width:84px;height:84px;border-radius:24px;background:linear-gradient(140deg,#F2B07A,#E5544B);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:42px;box-shadow:0 16px 34px -12px rgba(229,84,75,.6);animation:bootPop .5s cubic-bezier(.34,1.4,.64,1) both;")}>₹</div>
      <div style={css("font-size:24px;font-weight:900;letter-spacing:-.5px;color:#2A2420;animation:fadeIn .5s .1s ease both;")}>Cashflow</div>
      <div style={css("width:26px;height:26px;border-radius:50%;border:3px solid #ece3d4;border-top-color:#E5544B;animation:spin .7s linear infinite;margin-top:6px;")}></div>
    </div></Shell>;
  }
  // If Cognito isn't configured, fall back to a guest session so the app still runs.
  if(!authOn) return <App user={{ sub:undefined, name:'Guest' }} onSignOut={()=>{}} />;
  if(!user) return <AuthScreens onAuthed={setUser} />;
  return <App user={user} onSignOut={signOut} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>
